<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<title>Saint-Maurice &mdash; Mobile</title>
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="assets/favicon-48.png">
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#1a1a2e;color:#eee;font-family:"Segoe UI",Arial,sans-serif;
          touch-action:manipulation;overscroll-behavior-y:contain}
body{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}

/* PULL-TO-REFRESH : indicateur visuel attache au geste (style moderne, comme
   Twitter/X, Instagram). Le body se translate pendant le drag ; un spinner
   apparait au-dessus, tourne avec la progression, puis spin actif pendant le
   refetch reseau. Pas de reload de page : on re-fetch les JSON en place. */
body.ptr-dragging{transition:none}
body.ptr-releasing{transition:transform .25s ease}
.ptr-indicator{position:fixed;top:8px;left:50%;width:32px;height:32px;
               margin-left:-16px;border-radius:50%;
               background:#22223e;border:1px solid #3a3a5e;
               box-shadow:0 2px 8px rgba(0,0,0,.4);
               display:flex;align-items:center;justify-content:center;
               color:#cdd;font-size:16px;font-weight:700;
               opacity:0;transform:translateY(-40px) rotate(0deg);
               transition:opacity .2s, transform .25s ease;
               pointer-events:none;z-index:20}
.ptr-indicator.armed{color:#fff;background:#4a6fa5;border-color:#5a82bf}
.ptr-indicator.spinning{animation:ptr-spin .8s linear infinite}
.ptr-toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
           background:#22223e;color:#eee;border:1px solid #3a3a5e;
           padding:8px 14px;border-radius:18px;font-size:13px;
           box-shadow:0 4px 12px rgba(0,0,0,.4);
           opacity:0;transition:opacity .25s;pointer-events:none;z-index:21}
.ptr-toast.show{opacity:1}
.ptr-toast.err{border-color:#7a3030;color:#fbb}
@keyframes ptr-spin{from{transform:translateY(0) rotate(0deg)}
                    to  {transform:translateY(0) rotate(360deg)}}

/* HEADER sticky */
header{position:sticky;top:0;z-index:10;background:#1a1a2e;
       border-bottom:1px solid #2a2a4e;padding:10px 14px;
       display:flex;align-items:center;justify-content:space-between;gap:10px}
header h1{font-size:15px;font-weight:600;letter-spacing:.2px;color:#eee;
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header a#link-full{font-size:12px;color:#9ab;text-decoration:none;padding:6px 8px;
                   border:1px solid #3a3a5e;border-radius:6px;background:#22223e;
                   white-space:nowrap;min-height:32px;display:inline-flex;align-items:center}
header a#link-full:active{background:#2a2a4e}

/* CHIPS scrollables */
nav#chips{display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;
          padding:10px 12px;background:#1a1a2e;border-bottom:1px solid #2a2a4e;
          scroll-snap-type:x mandatory;
          -webkit-overflow-scrolling:touch;scrollbar-width:none}
nav#chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;min-width:54px;height:48px;
      border-radius:24px;border:1px solid #3a3a5e;background:#22223e;color:#cdd;
      font-size:15px;font-weight:600;letter-spacing:.3px;cursor:pointer;
      scroll-snap-align:center;padding:0 14px;
      display:inline-flex;align-items:center;justify-content:center;
      transition:transform .12s, background .12s}
.chip:active{transform:scale(.94)}
.chip.sel{background:#4a6fa5;color:#fff;border-color:#5a82bf;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.chip.sel.status-vert    {background:#1a6e2a;border-color:#2a8e3a}
.chip.sel.status-jaune   {background:#a08000;border-color:#c0a000}
.chip.sel.status-orange  {background:#a05500;border-color:#c07000}
.chip.sel.status-rouge   {background:#8a1010;border-color:#aa2020}

/* BARRE PERIODE (Heure/Jour/Semaine/Mois) */
nav#periodes{display:flex;gap:6px;padding:8px 12px;background:#1a1a2e;
             border-bottom:1px solid #2a2a4e}
.period-btn{flex:1;min-height:36px;padding:6px 4px;
            border:1px solid #3a3a5e;background:#22223e;color:#cdd;
            border-radius:8px;font:inherit;font-size:13px;font-weight:600;
            cursor:pointer;transition:transform .12s, background .12s}
.period-btn:active{transform:scale(.96)}
.period-btn.sel{background:#4a6fa5;color:#fff;border-color:#5a82bf;
                box-shadow:0 2px 6px rgba(0,0,0,.3)}

/* ETIQUETTE */
section#label{background:#fff;color:#1a1a2e;margin:12px;
              border-radius:10px;padding:14px 16px;
              box-shadow:0 2px 10px rgba(0,0,0,.25)}
#label.status-vert   {border-left:6px solid #1a6e2a}
#label.status-jaune  {border-left:6px solid #a08000}
#label.status-orange {border-left:6px solid #a05500}
#label.status-rouge  {border-left:6px solid #8a1010}
#label .row{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
#label .nom{font-size:20px;font-weight:700;letter-spacing:.2px}
#label .cap{font-size:13px;color:#666;white-space:nowrap}
#label .line{margin-top:8px;font-size:16px;line-height:1.35;display:flex;
             align-items:center;gap:8px;flex-wrap:wrap}
#label .ico{font-size:18px;width:22px;text-align:center;flex-shrink:0}
#label .val{font-weight:600}
#label .unit{font-size:13px;color:#555;font-weight:400}
#label .sub{font-size:13px;color:#666;font-weight:400}
#label .stale{opacity:.45}
#label .trend-up   {color:#a01818;font-weight:600}
#label .trend-down {color:#1a6e1a;font-weight:600}
#label .trend-flat {color:#3a3a3a}
#label .stats{margin-top:10px;padding-top:8px;border-top:1px solid #e3e6ef;
              font-size:12px;color:#666;display:flex;gap:14px;flex-wrap:wrap}
#label .stats b{color:#1a1a2e;font-weight:600}

/* CANVAS */
section#chartWrap{flex:1 1 auto;background:#fff;color:#1a1a2e;margin:0 12px;
                  border-radius:10px;padding:8px;
                  box-shadow:0 2px 10px rgba(0,0,0,.25);
                  min-height:340px}
canvas#bigCv{display:block;width:100%;height:50vh;min-height:320px;max-height:520px}

/* FOOTER */
footer{padding:14px;text-align:center;font-size:12px;color:#9ab;font-style:italic}
footer a{color:#bcd;text-decoration:underline}

/* ETAT chargement / erreur */
#status{padding:24px;text-align:center;color:#9ab;font-style:italic}
.hidden{display:none !important}
</style>
</head>
<body>
<div id="ptrIndicator" class="ptr-indicator" aria-hidden="true">&darr;</div>
<div id="ptrToast" class="ptr-toast" role="status" aria-live="polite"></div>
<header>
  <h1>Saint-Maurice &mdash; Mobile</h1>
  <a id="link-full" href="index.html?desktop=1">Version bureau &nearr;</a>
</header>

<nav id="chips" aria-label="Centrales"></nav>

<nav id="periodes" aria-label="P&eacute;riode" role="tablist" class="hidden">
  <button type="button" class="period-btn sel" data-key="horaire"      role="tab">Heure</button>
  <button type="button" class="period-btn"     data-key="journalier"   role="tab">Jour</button>
  <button type="button" class="period-btn"     data-key="hebdomadaire" role="tab">Semaine</button>
</nav>

<section id="label" class="hidden" aria-live="polite"></section>

<section id="chartWrap" class="hidden">
  <canvas id="bigCv"></canvas>
</section>

<div id="status">Chargement des donn&eacute;es&hellip;</div>

<footer>
  <span id="generatedAt">Mise &agrave; jour&nbsp;: 2026-07-19 11:34</span><br>
  <a id="link-readme" href="https://github.com/cg-247/saint-maurice#readme" target="_blank" rel="noopener">D&eacute;tails &amp; sources</a>
  &middot; <a href="mailto:charlesgauthier247@gmail.com?subject=Saint-Maurice%20%E2%80%94%20commentaire">Commentaires</a>
  &middot; <span title="Version de la PWA installee">v2.9.2</span>
</footer>

<script>
'use strict';

// Liens croises : en local (file:// ou serveur sur output/), l'index.html n'existe pas.
// On pointe alors directement vers animation-centrales.html (fichier voisin).
// Dans les deux cas on garde ?desktop=1 pour court-circuiter la redirection auto.
if (location.pathname.endsWith('animation-mobile.html')) {
  document.getElementById('link-full').href = 'animation-centrales.html?desktop=1';
}

// Lien "Details & sources" : en local, pointe vers le README.md voisin servi
// par notre serveur local. Sur GitHub Pages, garde le lien vers le repo source.
(function () {
  var lr = document.getElementById('link-readme');
  if (!lr) return;
  var isLocal = location.protocol === 'file:'
             || /^(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\])$/.test(location.hostname);
  if (isLocal) {
    lr.href = 'README.md';
    lr.removeAttribute('target');
    lr.removeAttribute('rel');
    lr.title = 'Apercu local du README publie';
  }
})();

// Codes 2 lettres par ID HQ (ordre amont->aval defini par le tri visuel ci-dessous).
const CODES = {
  '3-178':'CA', '3-180':'RC', '3-82':'RB', '3-83':'TR',
  '3-84':'BM',  '3-85':'LT',  '3-89':'GM', '3-90':'SH', '3-91':'GA'
};
// Ordre des chips : SUD -> NORD (La Gabelle, pres du Saint-Laurent, en premier ;
// Chute-Allard, le plus en amont, en dernier). Inverse du sens de l'eau qui coule.
const ORDER = ['3-91','3-90','3-89','3-85','3-84','3-83','3-82','3-180','3-178'];
const FALLBACK_ID = '3-83';   // Trenche, milieu du bassin
const STORE_KEY   = 'hq-mobile-centrale';

// --- Etat global ---
let D = null;            // dataset de la vue active { centrales, timestamps, periode, ... }
let N = 0;               // nb de frames de la vue active
let selectedIdx = -1;    // index dans D.centrales de la centrale selectionnee
let frame = 0;           // toujours = N-1 (derniere frame disponible)
let views = {};          // { horaire, journalier, hebdomadaire } -> dataset ou null
let dataStamp = null;    // manifest.generatedAt du dernier chargement (detecte les vrais changements)
let lastFetchAt = -1e9;  // performance.now() du dernier fetch reussi (garde-fou anti-spam du re-fetch auto)

// Affiche la date "Mise a jour" a partir du generatedAt du manifest (ISO UTC).
// La date vient des DONNEES, pas du HTML statique : dans une PWA installee le HTML est
// servi depuis le cache du SW et ne se rafraichit pas a chaque visite, alors que le
// manifest est refetch. En lisant la date du manifest, l'etiquette suit la fraicheur
// reelle des donnees. Conversion en heure locale Quebec (America/Montreal) independante
// du fuseau de l'appareil.
function setGeneratedAt(iso) {
  const el = document.getElementById('generatedAt');
  if (!el || !iso) return;
  const d = new Date(iso);
  if (isNaN(d.getTime())) return;
  const parts = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'America/Montreal',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  }).formatToParts(d).reduce((o, p) => (o[p.type] = p.value, o), {});
  const hh = parts.hour === '24' ? '00' : parts.hour;
  el.textContent = 'Mise à jour : ' + parts.year + '-' + parts.month + '-' + parts.day + ' ' + hh + ':' + parts.minute;
}

// --- Helpers ---
function statusClass(c, val) {
  if (val == null || c.minTotal == null || c.maxTotal == null) return '';
  const span = c.maxTotal - c.minTotal;
  if (span <= 0) return '';
  const r = (val - c.minTotal) / span * 100;
  if (r < 25) return 'status-vert';
  if (r < 50) return 'status-jaune';
  if (r < 75) return 'status-orange';
  return 'status-rouge';
}
function statusStroke(c, val) {
  switch (statusClass(c, val)) {
    case 'status-vert':   return '#1a6e2a';
    case 'status-jaune':  return '#7a6200';
    case 'status-orange': return '#7a3a00';
    case 'status-rouge':  return '#6a0000';
    default:              return '#555';
  }
}
// Calque "derniere valeur connue" : si val[i] est null, renvoie la derniere valeur non-null.
// Retourne aussi un flag stale = true si on a du remonter dans le passe.
function effectiveAt(arr, i) {
  if (arr[i] != null) return { v: arr[i], stale: false };
  for (let k = i - 1; k >= 0; k--) {
    if (arr[k] != null) return { v: arr[k], stale: true };
  }
  return { v: null, stale: false };
}
function fmtInt(v) { return (v == null) ? '—' : Math.round(v); }
function computeStats(arr) {
  let mn = Infinity, mx = -Infinity, sum = 0, n = 0;
  for (const v of arr) { if (v == null) continue; if (v < mn) mn = v; if (v > mx) mx = v; sum += v; n++; }
  return { min: n ? mn : null, max: n ? mx : null, avg: n ? sum / n : null, n };
}

// Tronque une vue aux N derniers points (timestamps + toutes les series par centrale).
// Idempotent : si la vue est plus courte que N, ne fait rien.
function trimView(view, n) {
  if (!view || !Array.isArray(view.timestamps)) return;
  const total = view.timestamps.length;
  if (total <= n) return;
  const start = total - n;
  view.timestamps = view.timestamps.slice(start);
  (view.centrales || []).forEach(c => {
    ['debits','turbs','devs','mws','trends','stables'].forEach(k => {
      if (Array.isArray(c[k])) c[k] = c[k].slice(start);
    });
  });
}

// Concatene la vue horaire du mois precedent + mois courant pour pouvoir
// afficher 15 j glissants meme a cheval sur 2 mois. Aligne les centrales par ID.
function mergeHoraire(prev, curr) {
  if (!prev) return curr;
  if (!curr) return prev;
  const merged = {
    timestamps: prev.timestamps.concat(curr.timestamps),
    centrales: curr.centrales.map(cc => {
      const pc = prev.centrales.find(p => p.id === cc.id);
      const pad = pc ? null : new Array(prev.timestamps.length).fill(null);
      const j = k => (pc ? pc[k] : pad).concat(cc[k] || []);
      return Object.assign({}, cc, {
        debits:  j('debits'),
        turbs:   j('turbs'),
        devs:    j('devs'),
        mws:     j('mws'),
        trends:  cc.trends  ? j('trends')  : undefined,
        stables: cc.stables ? j('stables') : undefined
      });
    })
  };
  // Conserve les autres champs scalaires de curr (periode, trendUnit, etc.).
  Object.keys(curr).forEach(k => {
    if (!(k in merged)) merged[k] = curr[k];
  });
  return merged;
}

// --- Chargement des donnees (factorise pour reutilisation par pull-to-refresh) ---
// opts.forceNetwork=true : bypasse le service worker (cache:'reload'), pour
// que le pull-to-refresh ne ramene pas le cache stale. Defaut: false (init
// normal, le SW peut servir le cache pour une ouverture instantanee).
async function loadData(opts) {
  const init = (opts && opts.forceNetwork) ? { cache: 'reload' } : undefined;
  const j = (url) => fetch(url, init).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status + ' ' + url); return r.json(); });

  const manifest = await j('data/manifest.json');
  const month = manifest.latestMonth;
  const months = manifest.months || [];
  const currEntry = months.find(m => m.month === month);
  const currFile = (currEntry && currEntry.file) || (month + '-horaire.json');
  const idx = months.findIndex(m => m.month === month);
  const prevEntry = (idx > 0) ? months[idx - 1] : null;

  const fetches = [
    j('data/' + currFile),
    j('data/sommaire.json')
  ];
  if (prevEntry) fetches.push(j('data/' + prevEntry.file).catch(() => null));
  const [horaireCurr, sommaire, horairePrev] = await Promise.all(fetches);
  const horaire = mergeHoraire(horairePrev || null, horaireCurr);

  const v = {
    horaire:      horaire || null,
    journalier:   sommaire.journalier   || null,
    hebdomadaire: sommaire.hebdomadaire || null
  };
  Object.entries(v).forEach(([k, view]) => { if (view && typeof view === 'object') view.periode = k; });
  trimView(v.horaire,     360);
  trimView(v.journalier,   15);
  trimView(v.hebdomadaire,  6);
  // Empreinte de generation : sert a detecter un vrai changement de donnees.
  v._stamp = manifest.generatedAt || null;
  lastFetchAt = performance.now();
  return v;
}

// --- Chargement initial ---
async function init() {
  try {
    views = await loadData();
    dataStamp = views._stamp;
    setGeneratedAt(dataStamp);

    // Selection initiale : localStorage ou fallback Trenche (sur la vue Heure
    // qui contient toujours toutes les centrales).
    const savedId = localStorage.getItem(STORE_KEY) || FALLBACK_ID;
    selectedIdx = views.horaire.centrales.findIndex(c => c.id === savedId);
    if (selectedIdx < 0) selectedIdx = views.horaire.centrales.findIndex(c => c.id === FALLBACK_ID);
    if (selectedIdx < 0) selectedIdx = 0;

    // Active la vue Heure et branche les boutons periode.
    setPeriode('horaire');
    document.querySelectorAll('.period-btn').forEach(btn => {
      btn.addEventListener('click', () => setPeriode(btn.dataset.key));
    });

    buildChips();
    document.getElementById('status').classList.add('hidden');
    document.getElementById('periodes').classList.remove('hidden');
    document.getElementById('label').classList.remove('hidden');
    document.getElementById('chartWrap').classList.remove('hidden');
    render();
    // Centrer la chip selectionnee dans le scroll
    setTimeout(() => {
      const sel = document.querySelector('.chip.sel');
      if (sel) sel.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'auto' });
    }, 0);
  } catch (e) {
    document.getElementById('status').textContent = 'Erreur de chargement : ' + e.message;
  }
}

// --- Refetch en place (declenche par pull-to-refresh). Bypasse le SW pour
// garantir des donnees fraiches, met a jour `views` et re-rend sans
// recharger la page. Throw si le reseau echoue (l'appelant gere le toast). ---
// Retourne true si les donnees ont reellement change (empreinte differente), false
// sinon. Ne re-rend QUE si quelque chose a change : un re-fetch identique ne provoque
// aucun clignotement. Throw si le reseau echoue (l'appelant gere le toast/erreur).
async function refreshData() {
  const fresh = await loadData({ forceNetwork: true });
  const changed = (fresh._stamp == null) || (fresh._stamp !== dataStamp);
  if (!changed) return false;
  views = fresh;
  dataStamp = fresh._stamp;
  setGeneratedAt(dataStamp);
  // Re-aligne selectedIdx (la liste des centrales devrait etre identique, mais
  // on se protege contre un changement d'ordre).
  if (selectedIdx >= 0 && views.horaire) {
    const oldId = (D && D.centrales[selectedIdx]) ? D.centrales[selectedIdx].id : null;
    if (oldId) {
      const ni = views.horaire.centrales.findIndex(c => c.id === oldId);
      if (ni >= 0) selectedIdx = ni;
    }
  }
  // Reactive la vue courante (ou horaire par defaut) avec les nouvelles donnees.
  const curKey = (D && D.periode) || 'horaire';
  setPeriode(views[curKey] ? curKey : 'horaire');
  buildChips();
  render();
  return true;
}

// Bascule la vue active. Conserve la centrale selectionnee si elle existe dans
// la nouvelle vue ; sinon fallback sur le 1er index disponible.
function setPeriode(key) {
  if (!views[key]) return;
  D = views[key];
  N = D.timestamps.length;
  frame = N - 1;
  // Re-aligne selectedIdx sur la centrale par son ID (les vues peuvent ne pas
  // partager le meme ordre, meme si en pratique elles le partagent).
  if (selectedIdx >= 0 && views.horaire && views.horaire.centrales[selectedIdx]) {
    const id = views.horaire.centrales[selectedIdx].id;
    const newIdx = D.centrales.findIndex(c => c.id === id);
    if (newIdx >= 0) selectedIdx = newIdx;
  }
  // MAJ visuelle des boutons.
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.classList.toggle('sel', btn.dataset.key === key);
  });
  // Re-render seulement si l'init est termine (render() lit le DOM #label).
  if (!document.getElementById('label').classList.contains('hidden')) render();
}

// --- Chips ---
function buildChips() {
  const nav = document.getElementById('chips');
  nav.innerHTML = '';
  // On respecte l'ordre amont->aval defini dans ORDER, en ne gardant que celles presentes.
  const byId = {};
  D.centrales.forEach((c, i) => { byId[c.id] = i; });
  const ordered = ORDER.filter(id => id in byId).map(id => byId[id]);
  // Ajoute en fin toute centrale presente dans D mais absente de ORDER (cas de bordure).
  D.centrales.forEach((c, i) => { if (!ORDER.includes(c.id)) ordered.push(i); });

  ordered.forEach(idx => {
    const c = D.centrales[idx];
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'chip';
    btn.dataset.idx = idx;
    btn.textContent = CODES[c.id] || c.nom.slice(0, 2).toUpperCase();
    btn.setAttribute('aria-label', c.nom);
    btn.addEventListener('click', () => selectIdx(idx));
    nav.appendChild(btn);
  });
}

function selectIdx(idx) {
  selectedIdx = idx;
  const c = D.centrales[idx];
  localStorage.setItem(STORE_KEY, c.id);
  render();
}

// --- Render etiquette + graphique ---
function render() {
  const c = D.centrales[selectedIdx];
  const i = frame;
  const debCur = c.debits[i];
  const statCls = statusClass(c, debCur);

  // Mise a jour visuelle des chips
  document.querySelectorAll('.chip').forEach(btn => {
    const idx = parseInt(btn.dataset.idx, 10);
    btn.classList.toggle('sel', idx === selectedIdx);
    btn.classList.remove('status-vert','status-jaune','status-orange','status-rouge');
    if (idx === selectedIdx && statCls) btn.classList.add(statCls);
  });

  // Etiquette
  const lab = document.getElementById('label');
  lab.classList.remove('status-vert','status-jaune','status-orange','status-rouge');
  if (statCls) lab.classList.add(statCls);

  const eDeb  = effectiveAt(c.debits, i);
  const eTurb = effectiveAt(c.turbs,  i);
  const eDev  = effectiveAt(c.devs,   i);
  const eMw   = effectiveAt(c.mws,    i);
  const tr    = c.trends ? c.trends[i] : null;
  const stab  = c.stables ? c.stables[i] : null;
  const trUnit = D.trendUnit || '6h';
  const stats  = computeStats(c.debits);
  const mwPct  = (eMw.v != null && c.cap_mw) ? Math.round(eMw.v / c.cap_mw * 100) : null;

  let trendHtml = '<span class="trend-flat">—</span>';
  if (tr != null) {
    if (tr > 50) {
      trendHtml = '<span class="trend-up">+' + Math.round(tr) + ' m³/s en ' + trUnit + '</span>';
    } else if (tr < -50) {
      trendHtml = '<span class="trend-down">' + Math.round(tr) + ' m³/s en ' + trUnit + '</span>';
    } else {
      const unit = { horaire:'h', journalier:'j', hebdomadaire:'sem', mensuel:'mois' }[D.periode] || 'h';
      const stTxt = (stab == null) ? 'stable' : 'stable depuis ' + stab + unit;
      trendHtml = '<span class="trend-flat">' + stTxt + '</span>';
    }
  }

  lab.innerHTML =
    '<div class="row">' +
      '<div class="nom">' + escapeHtml(c.nom) + '</div>' +
      (c.cap_mw ? '<div class="cap">' + c.cap_mw + ' MW install&eacute;s</div>' : '') +
    '</div>' +
    '<div class="line' + (eDeb.stale ? ' stale' : '') + '">' +
      '<span class="ico">💧</span>' +
      '<span class="val">' + fmtInt(eDeb.v) + '</span><span class="unit">m³/s total</span>' +
    '</div>' +
    '<div class="line' + ((eTurb.stale && eDev.stale) ? ' stale' : '') + '">' +
      '<span class="ico">⚙️</span>' +
      '<span class="val">' + fmtInt(eTurb.v) + '</span><span class="unit">turbin&eacute;</span>' +
      '<span style="width:6px"></span>' +
      '<span class="ico">🫗</span>' +
      '<span class="val">' + fmtInt(eDev.v) + '</span><span class="unit">d&eacute;vers&eacute;</span>' +
    '</div>' +
    '<div class="line' + (eMw.stale ? ' stale' : '') + '">' +
      '<span class="ico">⚡</span>' +
      '<span class="val">' + fmtInt(eMw.v) + '</span><span class="unit">MW' +
      (mwPct != null ? ' (' + mwPct + ' %)' : '') + '</span>' +
    '</div>' +
    '<div class="line">' +
      '<span class="ico">📈</span>' + trendHtml +
    '</div>' +
    '<div class="stats">' +
      '<span>min <b>' + fmtInt(stats.min) + '</b></span>' +
      '<span>moy <b>' + fmtInt(stats.avg) + '</b></span>' +
      '<span>max <b>' + fmtInt(stats.max) + '</b></span>' +
      '<span>n=<b>' + stats.n + '</b></span>' +
    '</div>';

  drawBigChart();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

// --- Graphique grand format (derive de drawBigChart() du template desktop) ---
// Simplifications mobile : pas de bande "futur" (frame = N-1 toujours),
// pas de curseur vertical (toujours sur la derniere frame, en bout de courbe),
// legende fixe en haut-gauche (pas de tri par chevauchement), padding gauche reduit.
const bigCv  = document.getElementById('bigCv');
const bigCtx = bigCv.getContext('2d');

function drawBigChart() {
  if (selectedIdx < 0 || !D) return;
  const c = D.centrales[selectedIdx];
  const arr = c.debits;

  // Resolution retina : on multiplie la taille en pixels par devicePixelRatio
  // pour eviter le flou sur ecrans haute densite, tout en gardant la taille CSS inchangee.
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const cssW = bigCv.clientWidth;
  const cssH = bigCv.clientHeight;
  bigCv.width  = Math.round(cssW * dpr);
  bigCv.height = Math.round(cssH * dpr);
  const cx = bigCtx;
  cx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const w = cssW, h = cssH;
  // pad.l = 64 : assez large pour un label "NNNN m³/s" (4 chiffres + unite) en
  // textAlign='right' a pad.l - 6. Avec pad.l=50, les centrales a fort debit
  // (Grand-Mere yMax~2800) avaient leur premier chiffre clippe hors canvas.
  const pad = { l: 64, r: 14, t: 8, b: 30 };
  cx.clearRect(0, 0, w, h);

  // Echelle Y : max combine sur les 3 series (debit total, turbine, deverse) + 5 %.
  let yMaxRaw = (c.maxTotal && c.maxTotal > 0 ? c.maxTotal : 1);
  for (const v of c.turbs) { if (v != null && v > yMaxRaw) yMaxRaw = v; }
  for (const v of c.devs)  { if (v != null && v > yMaxRaw) yMaxRaw = v; }
  const yMax = yMaxRaw + Math.max(50, yMaxRaw * 0.05);
  const xSpan = Math.max(1, N - 1);
  const innerW = w - pad.l - pad.r;
  const innerH = h - pad.t - pad.b;
  const xOf = i => pad.l + (i / xSpan) * innerW;
  const yOf = v => pad.t + (1 - v / yMax) * innerH;

  // Grille horizontale + ticks Y (5 lignes)
  cx.strokeStyle = '#e3e6ef'; cx.lineWidth = 1;
  cx.fillStyle = '#666'; cx.font = '11px "Segoe UI",Arial';
  cx.textAlign = 'right'; cx.textBaseline = 'middle';
  for (let g = 0; g <= 5; g++) {
    const y = pad.t + (g / 5) * innerH;
    cx.beginPath(); cx.moveTo(pad.l, y); cx.lineTo(pad.l + innerW, y); cx.stroke();
    cx.fillText(Math.round(yMax * (1 - g / 5)) + ' m³/s', pad.l - 6, y);
  }

  // Ticks X : format uniforme 'd mois' (ex. '23 juin') pour horaire/journalier,
  // adapte a la periode active :
  //   horaire      'yyyy-MM-dd HH:mm'           -> 'd mois' (un tick par jour, sans heure)
  //   journalier   'yyyy-MM-dd' (ou + suffixe)  -> 'd mois'
  //   hebdomadaire 'yyyy-MM-dd -> yyyy-MM-dd'   -> 'sem. du d mois' (debut de semaine)
  //   mensuel      'yyyy-MM'                    -> 'yyyy-MM' tel quel
  const MOIS_FR = ['janv','fevr','mars','avr','mai','juin','juil','aout','sept','oct','nov','dec'];
  // Formate 'yyyy-MM-dd...' -> 'd mois' (le 'd' initial est sans zero de tete
  // pour rester compact : "8 mai" plutot que "08 mai").
  const fmtDayMonth = (ts) => {
    const m = ts.match(/^\d{4}-(\d{2})-(\d{2})/);
    if (!m) return ts.slice(-5);
    const mois = MOIS_FR[parseInt(m[1], 10) - 1] || m[1];
    return parseInt(m[2], 10) + ' ' + mois;
  };
  const fmtTick = (ts) => {
    if (!ts) return '';
    if (D.periode === 'mensuel') return ts;
    if (D.periode === 'hebdomadaire') return 'sem. du ' + fmtDayMonth(ts);
    return fmtDayMonth(ts);
  };
  cx.fillStyle = '#666';
  cx.textAlign = 'center'; cx.textBaseline = 'top';

  // En vue Heure : un tick par jour calendaire (a la premiere heure disponible
  // de chaque jour), libelle court 'dd mois' (sans heure, qui varie selon le
  // point retenu). En vue Jour : un tick par point (deja une granularite
  // journaliere). Espacement minimal calcule a partir de la largeur REELLE du
  // texte (cx.measureText) plutot qu'une constante : le premier/dernier tick
  // sont alignes gauche/droite (le texte s'etend d'un seul cote de l'ancre),
  // les intermediaires sont centres (le texte s'etend des deux cotes) — une
  // marge fixe sous-estimerait le chevauchement avec le tick de gauche colle au bord.
  const gapFor = (prevAlign, prevW, nextAlign, nextW) => {
    // Distance mini entre deux ancres x pour que les boites de texte ne se
    // touchent pas, selon l'alignement de chacune (left/center/right).
    const half = (align, wpx) => align === 'center' ? wpx / 2 : wpx;
    return half(prevAlign, prevW) + half(nextAlign, nextW) + 6; // 6px de marge visuelle
  };
  cx.font = '11px "Segoe UI",Arial';
  let tickIdx;
  if (D.periode === 'horaire') {
    // Un candidat de tick par jour calendaire (1er point de chaque jour), le
    // dernier candidat etant toujours remplace par N-1 (le vrai dernier point
    // de la fenetre affichee, ex. midi) pour ne jamais dupliquer le jour final.
    const dayOf = (ts) => (ts || '').slice(0, 10);
    const dayIdx = [];
    let lastDay = null;
    for (let i = 0; i < N; i++) {
      const day = dayOf(D.timestamps[i]);
      if (day === lastDay) continue;
      lastDay = day;
      dayIdx.push(i);
    }
    dayIdx[dayIdx.length - 1] = N - 1;
    tickIdx = [];
    let lastX = -Infinity, lastAlign = 'left', lastW = 0;
    for (let k = 0; k < dayIdx.length; k++) {
      const i = dayIdx[k];
      const isFirst = tickIdx.length === 0;
      const isLast = k === dayIdx.length - 1;
      const align = isFirst ? 'left' : (isLast ? 'right' : 'center');
      const w = cx.measureText(fmtTick(String(D.timestamps[i] || ''))).width;
      const x = xOf(i);
      if (!isFirst && !isLast && x - lastX < gapFor(lastAlign, lastW, align, w)) continue;
      tickIdx.push(i);
      lastX = x; lastAlign = align; lastW = w;
    }
    // Le dernier candidat peut avoir ete saute par la boucle ci-dessus s'il
    // etait trop proche de l'avant-dernier tick retenu : on le force quand
    // meme (fin de la fenetre affichee), en retirant l'avant-dernier tick
    // choisi s'ils se chevauchent vraiment une fois les deux en alignement final.
    const lastDayIdx = dayIdx[dayIdx.length - 1];
    if (tickIdx[tickIdx.length - 1] !== lastDayIdx) {
      const prev = tickIdx[tickIdx.length - 1];
      const prevW = cx.measureText(fmtTick(String(D.timestamps[prev] || ''))).width;
      const lastW = cx.measureText(fmtTick(String(D.timestamps[lastDayIdx] || ''))).width;
      if (tickIdx.length > 1 && xOf(lastDayIdx) - xOf(prev) < gapFor('center', prevW, 'right', lastW)) {
        tickIdx.pop();
      }
      tickIdx.push(lastDayIdx);
    }
  } else if (D.periode === 'journalier' || D.periode === 'hebdomadaire') {
    // Un candidat de tick par point (deja une granularite journaliere ou
    // hebdomadaire) ; espacement dynamique identique a la vue Heure, le
    // libelle hebdomadaire ('sem. du d mois') etant plus long que 'd mois'.
    tickIdx = [];
    let lastX = -Infinity, lastAlign = 'left', lastW = 0;
    for (let i = 0; i < N; i++) {
      const isFirst = tickIdx.length === 0;
      const isLast = i === N - 1;
      const align = isFirst ? 'left' : (isLast ? 'right' : 'center');
      const w = cx.measureText(fmtTick(String(D.timestamps[i] || ''))).width;
      const x = xOf(i);
      if (!isFirst && !isLast && x - lastX < gapFor(lastAlign, lastW, align, w)) continue;
      tickIdx.push(i);
      lastX = x; lastAlign = align; lastW = w;
    }
    if (tickIdx[tickIdx.length - 1] !== N - 1) tickIdx.push(N - 1);
  } else {
    tickIdx = [];
    const xTicks = 4;
    for (let g = 0; g <= xTicks; g++) {
      tickIdx.push(Math.round((g / xTicks) * (N - 1)));
    }
  }
  // Alignement des libelles : le premier et dernier tick sont colles aux bords
  // (gauche/droite) pour eviter que le texte deborde du canvas ; les ticks
  // intermediaires restent centres sur leur position.
  for (let k = 0; k < tickIdx.length; k++) {
    const i = tickIdx[k];
    const x = xOf(i);
    // Premier/dernier tick colles au bord (gauche/droite) pour eviter que le
    // texte deborde du canvas ; intermediaires centres. S'applique a toutes
    // les periodes (le libelle 'sem. du d mois' en hebdomadaire est assez
    // long pour deborder aux extremites s'il restait centre).
    if (tickIdx.length > 1) {
      if (k === 0)                       cx.textAlign = 'left';
      else if (k === tickIdx.length - 1) cx.textAlign = 'right';
      else                               cx.textAlign = 'center';
    } else {
      cx.textAlign = 'center';
    }
    cx.fillText(fmtTick(String(D.timestamps[i] || '')), x, h - pad.b + 6);
  }

  // Couleur de la courbe debit total = statut courant (ratio min/max).
  const dCur = arr[frame];
  const stroke = statusStroke(c, dCur);
  const turbCol = 'rgba(46,160,67,.85)';
  const devCol  = 'rgba(110,110,110,.85)';

  const drawSeriesBig = (series, color, lw) => {
    cx.beginPath();
    cx.strokeStyle = color; cx.lineWidth = lw;
    let st = false;
    for (let i = 0; i < N; i++) {
      const v = series[i]; if (v == null) { st = false; continue; }
      const xx = xOf(i), yy = yOf(v);
      if (!st) { cx.moveTo(xx, yy); st = true; } else { cx.lineTo(xx, yy); }
    }
    cx.stroke();
  };
  drawSeriesBig(c.turbs, turbCol, 2);
  drawSeriesBig(c.devs,  devCol,  2);

  // Courbe debit total (dominante)
  cx.beginPath();
  cx.strokeStyle = stroke; cx.lineWidth = 2.4;
  let started = false;
  for (let i = 0; i < N; i++) {
    const v = arr[i]; if (v == null) { started = false; continue; }
    const xx = xOf(i), yy = yOf(v);
    if (!started) { cx.moveTo(xx, yy); started = true; } else { cx.lineTo(xx, yy); }
  }
  cx.stroke();

  // Point sur la derniere valeur (frame = N-1) avec label "X m³/s".
  if (dCur != null) {
    const xCur = xOf(frame), yCur = yOf(dCur);
    cx.fillStyle = stroke;
    cx.beginPath(); cx.arc(xCur, yCur, 4, 0, 2 * Math.PI); cx.fill();
    cx.fillStyle = '#222'; cx.font = 'bold 12px "Segoe UI",Arial';
    const valTxt = Math.round(dCur) + ' m³/s';
    const txtW = cx.measureText(valTxt).width;
    const fitsRight = (xCur + 6 + txtW) <= (pad.l + innerW - 2);
    cx.textAlign = fitsRight ? 'left' : 'right';
    cx.textBaseline = 'bottom';
    cx.fillText(valTxt, xCur + (fitsRight ? 6 : -6), yCur - 4);
  }

  // Legende fixe en haut-gauche (simple, pas de calcul de coin pour le mobile).
  const lgX0 = pad.l + 6, lgY0 = pad.t + 4;
  const lgSwW = 18, lgSwH = 6, lgGap = 16, lgPadX = 6, lgPadY = 5;
  cx.font = '11px "Segoe UI",Arial';
  const wMax = Math.max(
    cx.measureText('Débit total').width,
    cx.measureText('Turbiné').width,
    cx.measureText('Déversé').width
  );
  const boxW = wMax + lgSwW + 14 + 2 * lgPadX;
  const boxH = 3 * lgGap + 2 * lgPadY;
  cx.fillStyle = 'rgba(255,255,255,.85)';
  cx.fillRect(lgX0 - lgPadX, lgY0 - lgPadY, boxW, boxH);
  cx.strokeStyle = '#dde'; cx.lineWidth = 1;
  cx.strokeRect(lgX0 - lgPadX, lgY0 - lgPadY, boxW, boxH);
  cx.textAlign = 'left'; cx.textBaseline = 'top';
  const labels = [
    { c: stroke,  t: 'Débit total' },
    { c: turbCol, t: 'Turbiné' },
    { c: devCol,  t: 'Déversé' }
  ];
  labels.forEach((lb, k) => {
    cx.fillStyle = lb.c;
    cx.fillRect(lgX0, lgY0 + k * lgGap + 3, lgSwW, lgSwH);
    cx.fillStyle = '#333';
    cx.fillText(lb.t, lgX0 + lgSwW + 6, lgY0 + k * lgGap);
  });
}

// Redessine sur rotation / resize
let resizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (D) drawBigChart(); }, 100);
}, { passive: true });

// Demarrage
init();

// --- Pull-to-refresh (pattern moderne : indicateur visuel + refetch en place) ---
// Geste : doigt qui descend depuis le haut de page (scrollY === 0).
// - Pendant le drag : indicateur apparait, rotation/etat proportionnels a la progression.
// - Au relachement au-dela du seuil : refetch JSON en bypass cache (refreshData()),
//   pas de location.reload() => pas de flash de page, pas de "2e tentative".
// - Spinner reste actif pendant le refetch ; toast d'erreur si reseau echoue.
(function setupPullToRefresh() {
  const THRESHOLD = 70;
  const MAX_PULL = 140;
  let startY = 0;
  let dragging = false;
  let pulled = 0;
  let refreshing = false;  // bloque les nouveaux gestes pendant un refetch en cours
  const indicator = document.getElementById('ptrIndicator');
  const toast = document.getElementById('ptrToast');

  function setPull(px) {
    pulled = px;
    const clamped = Math.min(px, MAX_PULL);
    document.body.style.transform = 'translateY(' + clamped + 'px)';
    // Indicateur : apparait progressivement, tourne avec la progression, change
    // d'etat visuel quand le seuil est franchi.
    if (indicator) {
      const ratio = Math.min(clamped / THRESHOLD, 1);
      const armed = clamped >= THRESHOLD;
      indicator.style.opacity = Math.min(clamped / 30, 1);
      indicator.style.transform = 'translateY(' + Math.min(clamped - 8, 48) + 'px) rotate(' + (ratio * 180) + 'deg)';
      indicator.classList.toggle('armed', armed);
    }
  }

  function hideIndicator() {
    if (!indicator) return;
    indicator.classList.remove('armed','spinning');
    indicator.style.opacity = '';
    indicator.style.transform = '';
  }

  function reset() {
    document.body.classList.remove('ptr-dragging');
    document.body.classList.add('ptr-releasing');
    document.body.style.transform = '';
    hideIndicator();
    setTimeout(() => {
      document.body.classList.remove('ptr-releasing');
    }, 260);
  }

  function showToast(msg, isError) {
    if (!toast) return;
    toast.textContent = msg;
    toast.classList.toggle('err', !!isError);
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); }, 2200);
  }

  async function triggerRefresh() {
    refreshing = true;
    // Maintient le body legerement decale pour montrer que ca tourne, et active le spin.
    document.body.classList.remove('ptr-dragging');
    document.body.classList.add('ptr-releasing');
    document.body.style.transform = 'translateY(40px)';
    if (indicator) {
      indicator.style.opacity = '1';
      indicator.style.transform = 'translateY(32px) rotate(0deg)';
      indicator.classList.add('armed','spinning');
    }
    try {
      const changed = await refreshData();
      showToast(changed ? 'Donnees mises a jour' : 'Deja a jour', false);
    } catch (e) {
      showToast('Hors-ligne : donnees inchangees', true);
    } finally {
      refreshing = false;
      document.body.style.transform = '';
      hideIndicator();
      setTimeout(() => {
        document.body.classList.remove('ptr-releasing');
      }, 260);
    }
  }

  document.addEventListener('touchstart', e => {
    if (refreshing) { dragging = false; return; }
    // Tolerance : le bounce/overscroll natif laisse parfois scrollY a 1-2px alors
    // qu'on est visuellement en haut. Un seuil strict (> 0) faisait rater le 1er
    // geste, d'ou la sensation de devoir le faire deux fois.
    if (window.scrollY > 2) { dragging = false; return; }
    if (e.touches.length !== 1) { dragging = false; return; }
    startY = e.touches[0].clientY;
    dragging = true;
    pulled = 0;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    // Si l'utilisateur a scrolle entre-temps (plus en haut), on annule le geste.
    if (window.scrollY > 2) {
      if (pulled > 0) setPull(0);
      dragging = false;
      hideIndicator();
      return;
    }
    const dy = e.touches[0].clientY - startY;
    if (dy <= 0) {
      if (pulled > 0) setPull(0);
      dragging = false;
      hideIndicator();
      return;
    }
    const resisted = Math.round(Math.sqrt(dy * 32));
    document.body.classList.add('ptr-dragging');
    setPull(resisted);
    // Quand le move est cancelable, on bloque le scroll/bounce natif pour que NOTRE
    // geste prenne immediatement. S'il ne l'est pas (le navigateur a deja decide de
    // scroller), on suit quand meme le drag visuellement plutot que d'abandonner :
    // le geste reste actif et se declenchera au touchend.
    if (e.cancelable) e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    if (pulled >= THRESHOLD) {
      triggerRefresh();
    } else {
      reset();
    }
  }, { passive: true });

  document.addEventListener('touchcancel', () => {
    if (!dragging) return;
    dragging = false;
    reset();
  }, { passive: true });

  // --- Re-fetch auto au retour au premier plan ---
  // Comportement attendu d'une PWA : on rouvre l'app (ou on y revient apres l'avoir
  // mise en arriere-plan) et les donnees sont a jour, sans geste. Re-fetch SILENCIEUX
  // (pas de spinner, pas de toast) : refreshData() ne re-rend que si l'empreinte a
  // change. Garde-fous : pas pendant un refresh en cours, et au plus une fois / 30 s
  // (evite de spammer le reseau quand on bascule rapidement entre apps).
  const MIN_REFETCH_GAP = 30000; // ms
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState !== 'visible') return;
    if (refreshing) return;
    if (performance.now() - lastFetchAt < MIN_REFETCH_GAP) return;
    refreshing = true;
    refreshData()
      .catch(() => { /* hors-ligne : on garde les donnees actuelles, silencieux */ })
      .finally(() => { refreshing = false; });
  });
})();

// Enregistrement du service worker (PWA installable). Silencieux si non supporte
// ou en file:// : ne doit jamais bloquer l'affichage.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('controllerchange', function () {
    window.location.reload();
  });
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js', { scope: './' }).catch(function () { /* ignore */ });
  });
}
