<script>
// Redirection mobile : si la largeur de l'ecran fait <=768px, on bascule vers la page
// mobile. L'utilisateur peut forcer le desktop via le lien "Version bureau" depuis
// la page mobile, qui ajoute ?desktop=1 -> on memorise ce choix dans localStorage et
// on ne redirige plus.
//
// On utilise screen.width (largeur physique du device, en CSS pixels) plutot que
// window.innerWidth : sans balise <meta viewport>, iOS Safari rend la page avec une
// largeur virtuelle de 980px par defaut, ce qui ferait passer innerWidth bien au-dessus
// de 768 meme sur un iPhone. screen.width donne la vraie taille physique (375 sur
// iPhone SE, 390 sur 13/14, 430 sur Pro Max) -> detection fiable.
(function () {
  try {
    var params = new URLSearchParams(location.search);
    var STORE = 'hq-prefer-desktop';
    if (params.has('desktop')) {
      localStorage.setItem(STORE, '1');
      return; // pas de redirection cette fois, et plus jamais (tant que la clef existe)
    }
    if (localStorage.getItem(STORE) === '1') return;
    var w = Math.min(screen.width || 9999, window.innerWidth || 9999);
    if (w > 768) return;
    // En local on a animation-centrales.html (mobile = animation-mobile.html),
    // sur GitHub Pages on a index.html (mobile = mobile.html).
    var target = location.pathname.endsWith('animation-centrales.html')
                 ? 'animation-mobile.html'
                 : 'mobile.html';
    location.replace(target);
  } catch (e) { /* localStorage indisponible (mode prive ?) : pas de redirection */ }
})();
</script>

<script>
// Lien vers la version mobile : en local (output/), le fichier s'appelle animation-mobile.html ;
// sur GitHub Pages, il est renomme mobile.html. On adapte si on detecte le mode local.
if (location.pathname.endsWith('animation-centrales.html')) {
  var lm = document.getElementById('link-mobile');
  if (lm) lm.href = 'animation-mobile.html';
}

// Lien "Details & sources" : en local (file:// ou localhost), pointe vers le
// README.md voisin servi par notre serveur local. Sur GitHub Pages, garde le
// lien vers le repo source (rendu Markdown joli + historique).
(function () {
  var lr = document.getElementById('link-readme');
  if (!lr) return;
  var isLocal = location.protocol === 'file:'
             || /^(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\])$/.test(location.hostname);
  if (isLocal) {
    lr.href = 'README.md';
    lr.removeAttribute('target');
    lr.removeAttribute('rel');
    lr.title = 'Apercu local du README publie';
  }
})();

// ALL contient les vues actives + meta partages. Les donnees sont chargees a la
// demande depuis data/sommaire.json (vues Jour/Semaine/Mois entieres) et data/{YYYY-MM}-horaire.json
// (vue Heure, par mois). La structure ALL.byPeriode est compatible avec l'ancien
// format pour minimiser les changements dans le code de rendu.
//
// loadedMonths : Set des cles 'YYYY-MM' deja fetchees (vue Heure).
// horaireRaw   : objet { centrales, reservoirs, timestamps, riverSummaries } construit
//                progressivement par concatenation des mois charges (toujours trie chrono).
let ALL = { byPeriode: {}, labelW: 0, labelH: 0, labelWRes: 0, labelHRes: 0, legend: null, defaultPeriode: 'horaire' };
const loadedMonths = new Set();
let horaireRaw = null;       // { centrales: [...], reservoirs: [...], timestamps: [...], riverSummaries: [...] }
let manifest   = null;       // { months: [{month, frames, file}], latestMonth }
let isFetching = false;      // anti-rentrance pour le lazy load
// Icones charges depuis assets/icons/*.png (sortis du HTML pour l'alleger).
const iconNames = ["debit","deverse","eclair","turbine-vert","apport","centrale","barrage"];
const iconImgs = {};
let iconsLoaded = 0;
for (const n of iconNames) {
  const im = new Image();
  im.onload = () => { iconsLoaded++; if (iconsLoaded === iconNames.length && D) draw(frame); };
  im.src = 'assets/icons/' + n + '.png';
  iconImgs[n] = im;
}
const img = document.getElementById('img');
const cv  = document.getElementById('ov');
const ctx = cv.getContext('2d');
const slider     = document.getElementById('slider');
const sliderTs   = document.getElementById('sliderTs');
const btnPlay    = document.getElementById('btnPlay');
const btnPrev    = document.getElementById('btnPrev');
const btnNext    = document.getElementById('btnNext');
const btnStart   = document.getElementById('btnStart');
const btnEnd     = document.getElementById('btnEnd');
const tsLabel    = document.getElementById('ts');
const fi         = document.getElementById('fi');
const speedSel   = document.getElementById('speed');
const periodeSel = document.getElementById('periodeSel');
const riverBox   = document.getElementById('riverSummary');

let D = null;     // vue active (rebatie par setPeriode)
let N = 0;        // nombre de frames de la vue active
let frame = 0, playing = false, timer = null;
let modalIdx = -1;     // index centrale dans la modale (-1 = ferme)
let modalResIdx = -1;  // index reservoir dans la modale (-1 = ferme)

// Mode etendu par centrale ou reservoir : compactMode[key] = true => etendu, sinon compact (defaut).
// Compact centrale = nom + debit total. Etendu centrale = toutes les lignes + sparkline.
// Compact reservoir = nom + niveau + deversement. Etendu reservoir = + apport + sparkline niveau.
const compactMode = {};
function isExpanded(c) { return compactMode[c.id] === true; }
function isExpandedRes(r) { return compactMode['res:' + r.nom] === true; }

// Pour une serie [v0, null, null, v3, null] -> renvoie { eff: [v0,v0,v0,v3,v3], stale: [false,true,true,false,true] }.
// Si une valeur est null sans valeur connue avant, eff[i] reste null et stale[i] reste false (rien a afficher).
function computeLastKnown(arr) {
  if (!arr) return { eff: arr, stale: [] };
  const eff = new Array(arr.length);
  const stale = new Array(arr.length);
  let last = null;
  for (let i = 0; i < arr.length; i++) {
    const v = arr[i];
    if (v !== null && v !== undefined) {
      eff[i] = v;
      stale[i] = false;
      last = v;
    } else if (last !== null) {
      eff[i] = last;
      stale[i] = true;
    } else {
      eff[i] = null;
      stale[i] = false;
    }
  }
  return { eff, stale };
}

// Construit la vue active a partir de ALL.byPeriode[key] + meta partages.
function buildView(key) {
  const sub = ALL.byPeriode[key];
  // Pre-calcule pour chaque serie de chaque centrale et reservoir : valeur effective + flag stale.
  const centrales = sub.centrales.map(c => {
    const d = computeLastKnown(c.debits);
    const t = computeLastKnown(c.turbs);
    const v = computeLastKnown(c.devs);
    const m = computeLastKnown(c.mws);
    return Object.assign({}, c, {
      debitsEff: d.eff, debitsStale: d.stale,
      turbsEff:  t.eff, turbsStale:  t.stale,
      devsEff:   v.eff, devsStale:   v.stale,
      mwsEff:    m.eff, mwsStale:    m.stale
    });
  });
  const reservoirs = (sub.reservoirs || []).map(r => {
    const n = computeLastKnown(r.niveaux);
    const v = computeLastKnown(r.devs);
    // Apport : pas de last-known. Si la mesure du jour n'est pas dispo, on affiche 0
    // (coherent avec le sparkline qui retombe a 0). Stale = false partout (pas de palissement).
    const apportsEff   = (r.apports || []).map(x => x === null ? 0 : x);
    const apportsStale = (r.apports || []).map(() => false);
    return Object.assign({}, r, {
      niveauxEff: n.eff, niveauxStale: n.stale,
      devsEff:    v.eff, devsStale:    v.stale,
      apportsEff: apportsEff, apportsStale: apportsStale
    });
  });
  return {
    timestamps:        sub.timestamps,
    centrales:         centrales,
    reservoirs:        reservoirs,
    periode:           sub.periode,
    trendUnit:         sub.trendUnit,
    riverSummaries:    sub.riverSummaries || [],
    meteo:             sub.meteo || null,
    labelW:            ALL.labelW,
    labelH:            ALL.labelH,
    labelWRes:         ALL.labelWRes,
    labelHRes:         ALL.labelHRes,
    legend:            ALL.legend
  };
}

// Rend les **gras** markdown vers <strong> (sans risque XSS - on echappe d'abord).
function _renderInlineMarkdown(s) {
  if (!s) return '';
  const esc = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
}

function setPeriode(key) {
  if (!ALL.byPeriode[key]) {
    console.warn('Vue indisponible : ' + key);
    return;
  }
  D = buildView(key);
  N = D.timestamps.length;
  slider.max = Math.max(0, N - 1);
  // Bascule par defaut sur la frame la plus recente, comme l'init.
  frame = N - 1;
  slider.value = frame;
  // Re-render et MAJ du label de periode dans le titre.
  // En hebdomadaire, le timestamp est une plage 'dim -> sam' ; on n'affiche que le
  // dimanche de debut pour rester lisible (l'intervalle complet est visible dans le
  // label tsLabel quand on bouge le slider).
  const perEl = document.getElementById('periode');
  if (perEl && D.timestamps && D.timestamps.length) {
    const startOfWeek = (s) => s.split(' ')[0];
    const first = D.timestamps[0];
    const last  = D.timestamps[D.timestamps.length - 1];
    const a = (key === 'hebdomadaire') ? startOfWeek(first) : first;
    const b = (key === 'hebdomadaire') ? startOfWeek(last)  : last;
    const labelKey = { horaire: 'Heure', journalier: 'Jour', hebdomadaire: 'Semaine', mensuel: 'Mois' }[key] || key;
    perEl.textContent = '(periode : ' + a + ' au ' + b + ') [' + labelKey + ']';
  }
  // Sous-titre : explique ce que les chiffres affiches representent. En vue
  // Heure, les ts horaires sont deja explicites (instantane), donc rien.
  const subEl = document.getElementById('subtitle');
  if (subEl) {
    subEl.textContent = (key === 'horaire') ? '' : 'Débit max atteint sur la période';
  }
  if (typeof go === 'function') go(frame);
}

// --- Chargement initial asynchrone ---
// Fetch dans cet ordre :
//   1. manifest.json (meta + liste des mois horaires)
//   2. sommaire.json (vues Jour/Semaine/Mois entieres)
//   3. {latestMonth}-horaire.json (mois courant pour la vue Heure)
// Une fois les 3 charges, on reconstruit ALL.byPeriode et on appelle setPeriode().
async function fetchJson(url) {
  const r = await fetch(url, { cache: 'no-cache' });
  if (!r.ok) throw new Error('HTTP ' + r.status + ' sur ' + url);
  return r.json();
}

// Concatene les sous-vues horaires deja chargees dans horaireRaw.
// Re-trie par timestamp UTC pour garantir l'ordre chronologique.
function rebuildHoraireFromLoadedMonths() {
  // Collecte les mois charges, dans l'ordre chronologique du manifest.
  const months = manifest.months
    .filter(m => loadedMonths.has(m.month) && m._data)
    .sort((a, b) => a.month.localeCompare(b.month));
  if (months.length === 0) { horaireRaw = null; return; }
  // Premiere vue : copie la structure (centrales/reservoirs/timestamps/riverSummaries).
  const first = months[0]._data;
  const centrales = first.centrales.map(c => Object.assign({}, c, {
    debits: c.debits.slice(), turbs: c.turbs.slice(), devs: c.devs.slice(),
    mws: c.mws.slice(), trends: c.trends.slice(), stables: c.stables.slice()
  }));
  const reservoirs = (first.reservoirs || []).map(r => Object.assign({}, r, {
    niveaux: r.niveaux.slice(), devs: r.devs.slice(), apports: r.apports.slice()
  }));
  const timestamps = first.timestamps.slice();
  const riverSummaries = (first.riverSummaries || []).slice();
  // Meteo : on conserve la structure { zones, frames } du premier mois, puis on
  // concatene les frames des mois suivants. Les `zones` sont la config (stable
  // entre mois) — si jamais elles divergent, on garde celles du premier mois.
  let meteo = null;
  if (first.meteo && first.meteo.frames) {
    meteo = { zones: first.meteo.zones.slice(), frames: first.meteo.frames.slice() };
  }
  // Concatene les mois suivants. Sécurité : on apparie par ID (centrale.id, reservoir.nom)
  // plutôt que par index — si la config bassin change entre deux régénérations partielles
  // (ajout/retrait d'une centrale), un appariement par index melangerait silencieusement
  // les séries. Les centrales/réservoirs présents dans le mois courant mais absents du
  // mois ajouté reçoivent des null (nb_frames du mois ajouté) ; ceux présents dans le
  // mois ajouté mais absents du courant sont ignorés (avec un warn console).
  for (let mi = 1; mi < months.length; mi++) {
    const sub = months[mi]._data;
    const nFrames = sub.timestamps.length;
    const nulls = () => new Array(nFrames).fill(null);

    const srcCentralesById = new Map(sub.centrales.map(c => [c.id, c]));
    for (const dest of centrales) {
      const src = srcCentralesById.get(dest.id);
      if (src) {
        dest.debits.push(...src.debits);
        dest.turbs.push(...src.turbs);
        dest.devs.push(...src.devs);
        dest.mws.push(...src.mws);
        dest.trends.push(...src.trends);
        dest.stables.push(...src.stables);
        srcCentralesById.delete(dest.id);
      } else {
        console.warn('Centrale absente du mois ' + months[mi].month + ' : ' + dest.id + ' (' + dest.nom + ') — comblee par null');
        dest.debits.push(...nulls()); dest.turbs.push(...nulls()); dest.devs.push(...nulls());
        dest.mws.push(...nulls());    dest.trends.push(...nulls()); dest.stables.push(...nulls());
      }
    }
    for (const orphan of srcCentralesById.values()) {
      console.warn('Centrale presente uniquement dans le mois ' + months[mi].month + ' : ' + orphan.id + ' (' + orphan.nom + ') — ignoree');
    }

    const srcReservoirsByNom = new Map(sub.reservoirs.map(r => [r.nom, r]));
    for (const dest of reservoirs) {
      const src = srcReservoirsByNom.get(dest.nom);
      if (src) {
        dest.niveaux.push(...src.niveaux);
        dest.devs.push(...src.devs);
        dest.apports.push(...src.apports);
        srcReservoirsByNom.delete(dest.nom);
      } else {
        console.warn('Reservoir absent du mois ' + months[mi].month + ' : ' + dest.nom + ' — comble par null');
        dest.niveaux.push(...nulls()); dest.devs.push(...nulls()); dest.apports.push(...nulls());
      }
    }
    for (const orphan of srcReservoirsByNom.values()) {
      console.warn('Reservoir present uniquement dans le mois ' + months[mi].month + ' : ' + orphan.nom + ' — ignore');
    }

    timestamps.push(...sub.timestamps);
    riverSummaries.push(...(sub.riverSummaries || []));
    if (meteo && sub.meteo && sub.meteo.frames) {
      meteo.frames.push(...sub.meteo.frames);
    } else if (meteo) {
      // Mois sans meteo : on remplit avec des frames nulles pour conserver l'alignement.
      const nullsFrame = meteo.zones.map(() => ({ n: null, tmn: null, tmx: null }));
      for (let k = 0; k < sub.timestamps.length; k++) meteo.frames.push(nullsFrame);
    }
  }
  horaireRaw = {
    centrales, reservoirs, timestamps, riverSummaries, meteo,
    periode: 'horaire',
    trendUnit: first.trendUnit
  };
}

// Charge un mois horaire (idempotent : ignore si deja charge).
async function ensureMonthLoaded(monthKey) {
  if (loadedMonths.has(monthKey)) return;
  const entry = manifest.months.find(m => m.month === monthKey);
  if (!entry) return;
  const data = await fetchJson('data/' + entry.file);
  entry._data = data;
  loadedMonths.add(monthKey);
  rebuildHoraireFromLoadedMonths();
  ALL.byPeriode.horaire = horaireRaw;
}

// Trouve le mois immediatement avant le plus ancien deja charge, et le fetch.
// Apres fetch, recalcule la vue Heure pour preserver la position relative du frame.
async function maybeLoadPreviousMonth() {
  if (!manifest || isFetching) return;
  // Tri chronologique des mois charges.
  const loaded = Array.from(loadedMonths).sort();
  if (loaded.length === 0) return;
  const oldest = loaded[0];
  const idx = manifest.months.findIndex(m => m.month === oldest);
  if (idx <= 0) return;   // deja au mois le plus ancien
  const prevMonth = manifest.months[idx - 1].month;
  if (loadedMonths.has(prevMonth)) return;
  isFetching = true;
  try {
    // Memorise le timestamp courant pour repositionner apres concatenation.
    const wasInHoraire = (D && D.periode === 'horaire');
    const currentTs = wasInHoraire ? D.timestamps[frame] : null;
    await ensureMonthLoaded(prevMonth);
    if (wasInHoraire && periodeSel.value === 'horaire') {
      // Re-applique la vue : N change, frame doit pointer sur le meme ts qu'avant.
      setPeriode('horaire');
      if (currentTs) {
        const newIdx = D.timestamps.indexOf(currentTs);
        if (newIdx >= 0) go(newIdx);
      }
    }
  } catch (err) {
    console.error('Echec chargement mois precedent', err);
  } finally {
    isFetching = false;
  }
}

async function init() {
  try {
    manifest = await fetchJson('data/manifest.json');
    ALL.labelW = manifest.labelW; ALL.labelH = manifest.labelH;
    ALL.labelWRes = manifest.labelWRes; ALL.labelHRes = manifest.labelHRes;
    ALL.legend = manifest.legend;
    ALL.defaultPeriode = manifest.defaultPeriode || 'horaire';

    // Sommaire (vues agregees) en parallele avec le mois courant.
    const latest = manifest.latestMonth;
    const [sommaire] = await Promise.all([
      fetchJson('data/sommaire.json'),
      latest ? ensureMonthLoaded(latest) : Promise.resolve()
    ]);
    if (sommaire.journalier)   ALL.byPeriode.journalier   = sommaire.journalier;
    if (sommaire.hebdomadaire) ALL.byPeriode.hebdomadaire = sommaire.hebdomadaire;
    if (sommaire.mensuel)      ALL.byPeriode.mensuel      = sommaire.mensuel;

    // Choisit la periode par defaut, en se rabattant sur une vue disponible.
    let initialPeriode = ALL.defaultPeriode;
    if (!ALL.byPeriode[initialPeriode]) {
      initialPeriode = ['horaire','journalier','hebdomadaire','mensuel'].find(k => ALL.byPeriode[k]) || 'horaire';
    }
    periodeSel.value = initialPeriode;
    setPeriode(initialPeriode);
  } catch (err) {
    console.error('Erreur de chargement initial', err);
    if (riverBox) riverBox.innerHTML = '<span class="when">Erreur de chargement</span>' + (err.message || err);
  }
}
init();

function ratioColor(r) {
  // Couleur basee sur (current - min) / (max - min) en %
  if (r === null || r === undefined) return {f:'rgba(120,120,120,.88)',s:'#555'};
  if (r < 25) return {f:'rgba(46,160,67,.92)',  s:'#1a6e2a'};   // vert
  if (r < 50) return {f:'rgba(210,170,0,.92)',  s:'#7a6200'};   // jaune
  if (r < 75) return {f:'rgba(230,110,0,.92)',  s:'#7a3a00'};   // orange
  return            {f:'rgba(200,30,30,.92)',   s:'#6a0000'};   // rouge
}

function drawLeftSegments(ctx, segments, x, y, defaultFont) {
  // segments = [{text, color, font?} | {icon: name, size: px} | {gap: px}, ...]
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  let curX = x;
  for (const s of segments) {
    if (s.gap !== undefined) {
      curX += s.gap;
    } else if (s.icon) {
      const im = iconImgs[s.icon];
      const sz = Math.round(s.size);
      if (im && im.complete && im.naturalWidth > 0) {
        ctx.drawImage(im, curX, y - sz/2, sz, sz);
      }
      curX += sz + Math.round(2 * (s.size / 14));  // espacement proportionnel a la taille
    } else {
      ctx.font = s.font || defaultFont;
      ctx.fillStyle = s.color;
      ctx.fillText(s.text, curX, y);
      curX += ctx.measureText(s.text).width;
    }
  }
}

function fmt2(v) {
  // Formate un nombre avec 2 decimales et virgule (locale fr)
  return v.toFixed(2).replace('.', ',');
}

function draw(i) {
  const sx = cv.width  / img.naturalWidth;
  const sy = cv.height / img.naturalHeight;
  ctx.clearRect(0,0,cv.width,cv.height);
  const lw = D.labelW * sx;
  const lh = D.labelH * sy;

  // ---- CENTRALES ----
  for (const c of D.centrales) {
    const deb = c.debits[i];
    // Ratio min/max historique pour la couleur
    let ratio = null;
    if (deb !== null && c.minTotal !== null && c.maxTotal !== null && (c.maxTotal - c.minTotal) > 0) {
      ratio = Math.round((deb - c.minTotal) / (c.maxTotal - c.minTotal) * 100);
    }
    const col = ratioColor(ratio);
    const ix = c.iconX * sx, iy = c.iconY * sy;
    const lx = c.labelX * sx, ly = c.labelY * sy;
    // Largeur d'etiquette specifique a la centrale si definie (ex. nom long), sinon valeur par defaut.
    const lwC = (c.labelW || D.labelW) * sx;

    // Hauteur effective : reduite a 36 % en mode compact (nom + debit total uniquement).
    const expanded = isExpanded(c);
    const lhEff = expanded ? lh : lh * 0.36;

    // Ligne de rappel icon -> etiquette (pointillee). Calcul base sur lhEff
    // pour que la ligne s'arrete sur le bord visible du rectangle.
    const lcx = lx + lwC/2, lcy = ly + lhEff/2;
    const dx = ix - lcx,   dy  = iy - lcy;
    let ex = lcx, ey = lcy;
    if (Math.abs(dx) > Math.abs(dy) * (lwC/lhEff)) { ex = dx>0 ? lx+lwC : lx; }
    else                                            { ey = dy>0 ? ly+lhEff : ly; }
    ctx.save();
    ctx.setLineDash([6*sx, 6*sx]);
    ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(ix,iy);
    ctx.strokeStyle='rgba(50,50,50,.65)'; ctx.lineWidth=1.1*sx; ctx.stroke();
    ctx.restore();

    // Pastille icone
    ctx.beginPath(); ctx.arc(ix,iy,4*sx,0,2*Math.PI);
    ctx.fillStyle=col.f; ctx.fill();

    // (XXX MW) au cote du nom de la centrale sur l'image (position depuis config)
    if (c.cap_mw !== null) {
      const fsCap = Math.max(8, Math.round(13 * sx));
      let capX, capY;
      if (c.mwLabelX !== null && c.mwLabelY !== null) {
        capX = c.mwLabelX * sx;
        capY = c.mwLabelY * sy;
      } else {
        capX = ix + (c.nom.length * 4 * sx) + 8 * sx;
        capY = iy - 8 * sy;
      }
      ctx.font = fsCap+'px "Segoe UI",Arial,sans-serif';
      ctx.fillStyle = 'rgba(80,80,80,.95)';
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText('(' + c.cap_mw + ' MW)', capX, capY);
    }

    // Fond etiquette : utilise lhEff pour vraiment liberer de l'espace en mode compact.
    ctx.fillStyle='rgba(242,242,242,.95)';
    ctx.fillRect(lx,ly,lwC,lhEff);
    // Barre coloree gauche (elargie pour bien voir le statut)
    const barW = 12 * sx;
    ctx.fillStyle=col.f; ctx.fillRect(lx,ly,barW,lhEff);
    // Bordure
    ctx.strokeStyle='rgba(80,80,80,.6)'; ctx.lineWidth=.9*sx;
    ctx.strokeRect(lx,ly,lwC,lhEff);

    const leftX = lx + barW + 6 * sx;
    const fsName      = Math.max(11, Math.round(17 * sx));
    const fsTotal     = Math.max(10, Math.round(20 * sx));
    const fsIcon      = Math.max(12, Math.round(30 * sx));
    const fsIconDev   = Math.max(14, Math.round(25 * sx));   // meme taille que sur les reservoirs
    const fsDetail    = Math.max(10, Math.round(16 * sx));
    const fsMw        = Math.max(10, Math.round(17 * sx));
    const fsTrend     = Math.max(10, Math.round(15 * sx));
    const fontName      = 'bold ' + fsName  + 'px "Segoe UI",Arial,sans-serif';
    const fontDetail    = fsDetail    + 'px "Segoe UI",Arial,sans-serif';
    const fontMw        = 'bold ' + fsMw    + 'px "Segoe UI",Arial,sans-serif';
    const fontTotal     = 'bold ' + fsTotal + 'px "Segoe UI",Arial,sans-serif';

    // Couleurs pour les valeurs : intensite reduite pour mettre le nom en evidence
    const valCol = '#555';

    // Ligne 0 : icone "rosace centrale" + nom de la centrale en gras + trait de separation.
    const fsCentrIcon = Math.max(12, Math.round(fsName * 1.40));
    drawLeftSegments(ctx, [
      { icon: 'centrale', size: fsCentrIcon },
      { text: c.nom, color: '#111' }
    ], leftX, ly + lh*0.084, fontName);

    // Indicateur pliage : fleche dans le coin haut-droit, plus grosse que le nom.
    // Compact : ▾ (cliquer pour etendre). Etendu : ▴ (cliquer pour replier).
    const fsArrow = Math.max(18, Math.round(28 * sx));
    ctx.font = 'bold ' + fsArrow + 'px "Segoe UI",Arial,sans-serif';
    ctx.fillStyle = '#1a1a2e';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(expanded ? '▴' : '▾', lx + lwC - 6*sx, ly + lh*0.084);
    const sepY = ly + lh*0.19;
    ctx.beginPath();
    ctx.moveTo(leftX, sepY);
    ctx.lineTo(lx + lwC - 6*sx, sepY);
    ctx.strokeStyle = 'rgba(120,120,120,.55)';
    ctx.lineWidth = 0.8*sx;
    ctx.stroke();

    // Ligne 1 : debit total (primaire) avec gouttes (icone PNG)
    // Si donnee fraiche absente, on affiche la derniere valeur connue avec opacite reduite.
    const debEff = c.debitsEff[i];
    if (debEff !== null) {
      ctx.save();
      if (c.debitsStale[i]) ctx.globalAlpha = 0.45;
      drawLeftSegments(ctx, [
        { icon: 'debit', size: fsIcon },
        { text: debEff + ' m³/s', color: valCol }
      ], leftX, ly + lh*0.262, fontTotal);
      ctx.restore();
    }

    // Lignes 2-4 + sparkline : visibles seulement quand la centrale est etendue.
    if (isExpanded(c)) {
      // Ligne 2 : detail (engrenage vert + valeur) + (verre + valeur), icones PNG
      const turbEff = c.turbsEff[i];
      const devEff  = c.devsEff[i];
      const turbStale = c.turbsStale[i];
      const devStale  = c.devsStale[i];
      if (turbEff !== null || devEff !== null) {
        const grayCol = 'rgba(110,110,110,.95)';
        ctx.save();
        const lineStale = (turbEff !== null && devEff !== null) ? (turbStale && devStale)
                         : (turbEff !== null ? turbStale : devStale);
        if (lineStale) ctx.globalAlpha = 0.45;
        drawLeftSegments(ctx, [
          { icon: 'turbine-vert', size: fsIcon },
          { text: (turbEff !== null ? turbEff : '-') + '   ', color: grayCol },
          { icon: 'deverse', size: fsIconDev },
          { text: (devEff  !== null ? devEff  : '-'), color: grayCol }
        ], leftX, ly + lh*0.40, fontDetail);
        ctx.restore();
      }

      // Ligne 3 : MW calcule avec eclair (icone PNG)
      const mwEff = c.mwsEff[i];
      if (mwEff !== null) {
        const fsMwUnit = Math.max(8, Math.round(fsMw / 2));
        const fontMwUnit = fsMwUnit + 'px "Segoe UI",Arial,sans-serif';
        const segs = [
          { icon: 'eclair', size: fsIcon },
          { text: mwEff + ' ',  color: valCol },
          { text: 'MW ',        color: valCol, font: fontMwUnit }
        ];
        if (c.cap_mw !== null) {
          const mwR = Math.round(mwEff / c.cap_mw * 100);
          segs.push({ text: '(' + mwR + ' %)', color: valCol });
        }
        ctx.save();
        if (c.mwsStale[i]) ctx.globalAlpha = 0.45;
        drawLeftSegments(ctx, segs, leftX, ly + lh*0.55, fontMw);
        ctx.restore();
      }

      // Ligne 4 : tendance
      const tr = c.trends[i];
      const fontTrend = fsTrend+'px "Segoe UI",Arial,sans-serif';
      const trUnit = D.trendUnit || '6h';
      if (tr === null) {
        drawLeftSegments(ctx, [{ text: '—', color: '#3a3a3a' }], leftX, ly + lh*0.68, fontTrend);
      } else {
        const sign = tr >= 0 ? '+' : '';
        if (tr > 50) {
          drawLeftSegments(ctx, [
            { text: sign + tr + ' m³/s en ' + trUnit, color: '#a01818' }
          ], leftX, ly + lh*0.68, fontTrend);
        } else if (tr < -50) {
          drawLeftSegments(ctx, [
            { text: sign + tr + ' m³/s en ' + trUnit, color: '#1a6e1a' }
          ], leftX, ly + lh*0.68, fontTrend);
        } else {
          const sh = c.stables ? c.stables[i] : null;
          const stTxt = (sh === null || sh === undefined) ? 'stable'
                      : (typeof sh === 'string' ? 'stable depuis ' + sh
                                                : 'stable depuis ' + sh + (D.periode === 'horaire' ? 'h' : (D.periode === 'journalier' ? 'j' : 'sem')));
          drawLeftSegments(ctx, [
            { text: stTxt, color: '#3a3a3a' }
          ], leftX, ly + lh*0.68, fontTrend);
        }
      }

      // Sparkline minimaliste avec axes X (temps) et Y (debit min/max).
      // Reserve de la place pour les labels : 3 caracteres a droite (axe Y), 1 ligne en bas (axe X).
      const sparkH = 45 * sy;
      const sparkBottomMargin = 4 * sy;
      // Espaces reserves pour les labels (en pixels CANVAS, donc deja scales).
      const fsAxis = Math.max(8, Math.round(10 * sx));
      const yLabelW = fsAxis * 2.6;     // largeur reservee a droite pour les chiffres min/max
      const xLabelH = fsAxis * 1.4;     // hauteur reservee en bas pour la date
      // Zone reelle de tracage de la courbe (apres soustraction des marges axes).
      const plotX = lx + barW + 4 * sx;
      const plotY = ly + lh - sparkH - sparkBottomMargin;
      const plotW = lwC - barW - 8 * sx - yLabelW;
      const plotH = sparkH - xLabelH;
      // Min/max combine sur les 3 series (debit total, turbine, deverse) pour
      // que les 3 courbes partagent la meme echelle Y. On part du min/max
      // historique du debit total (qui est souvent dominant) puis on etend
      // si turbine/deverse depassent dans la fenetre courante.
      let yMinC = c.minTotal, yMaxC = c.maxTotal;
      if (yMinC === null || yMaxC === null) { yMinC = 0; yMaxC = 1; }
      for (const v of c.turbs) { if (v === null) continue; if (v < yMinC) yMinC = v; if (v > yMaxC) yMaxC = v; }
      for (const v of c.devs)  { if (v === null) continue; if (v < yMinC) yMinC = v; if (v > yMaxC) yMaxC = v; }
      // Garder 0 comme borne basse si toutes les series sont positives — sinon
      // les courbes deverse (souvent ~0) seraient ecrasees au bas de l'axe.
      if (yMinC > 0) yMinC = 0;
      if (plotH > 6 && plotW > 10 && yMaxC > yMinC) {
        const range = yMaxC - yMinC;
        const yOf = v => plotY + plotH - ((v - yMinC) / Math.max(range, 1)) * plotH;
        // Bande "futur" en gris pale.
        const xFuture = plotX + ((i + 1) / (N - 1)) * plotW;
        if (xFuture < plotX + plotW) {
          ctx.fillStyle = 'rgba(150,150,160,.12)';
          ctx.fillRect(xFuture, plotY, plotX + plotW - xFuture, plotH);
        }
        // Axes : trait Y a gauche, trait X en bas.
        ctx.strokeStyle = 'rgba(80,80,90,.6)';
        ctx.lineWidth = 0.8 * sx;
        ctx.beginPath();
        ctx.moveTo(plotX, plotY);
        ctx.lineTo(plotX, plotY + plotH);
        ctx.lineTo(plotX + plotW, plotY + plotH);
        ctx.stroke();
        // Labels axe Y (max en haut, min en bas), aligne a droite, juste apres la zone de plot.
        ctx.font = fsAxis + 'px "Segoe UI",Arial,sans-serif';
        ctx.fillStyle = 'rgba(60,60,70,.85)';
        ctx.textAlign = 'left'; ctx.textBaseline = 'top';
        ctx.fillText(Math.round(yMaxC), plotX + plotW + 3 * sx, plotY);
        ctx.textBaseline = 'bottom';
        ctx.fillText(Math.round(yMinC), plotX + plotW + 3 * sx, plotY + plotH);
        // Labels axe X : date debut a gauche, date fin a droite (sous l'axe).
        ctx.fillStyle = 'rgba(60,60,70,.75)';
        ctx.textBaseline = 'top';
        const xAxisY = plotY + plotH + 2 * sy;
        const tsFirst = D.timestamps[0] || '';
        const tsLast  = D.timestamps[D.timestamps.length - 1] || '';
        // Format compact : pour Heure '04-04 06:00' -> '04-04' ; pour Jour '2026-04-04' -> '04-04' ;
        // pour Semaine '2026-04-04 -> ...' -> '04-04' ; pour Mois '2026-04' -> '04'.
        const compactX = (s) => {
          if (!s) return '';
          if (D.periode === 'mensuel') return s.split('-')[1] || s;
          // Sinon prend la date 'AAAA-MM-JJ' et garde 'MM-JJ'.
          const datePart = s.split(' ')[0];
          const m = datePart.match(/^\d{4}-(\d{2})-(\d{2})/);
          return m ? (m[1] + '-' + m[2]) : datePart;
        };
        ctx.textAlign = 'left';
        ctx.fillText(compactX(tsFirst), plotX + 1 * sx, xAxisY);
        ctx.textAlign = 'right';
        ctx.fillText(compactX(tsLast), plotX + plotW - 1 * sx, xAxisY);
        // Trace turbine (vert) puis deverse (gris) en arriere-plan, puis le
        // debit total (couleur statut) par-dessus pour qu'il reste lisible.
        const drawSeries = (series, color, lw) => {
          ctx.beginPath();
          ctx.strokeStyle = color;
          ctx.lineWidth = lw;
          let st = false;
          for (let k = 0; k < N; k++) {
            const v = series[k];
            if (v === null) { st = false; continue; }
            const xx = plotX + (k / (N - 1)) * plotW;
            const yy = yOf(v);
            if (!st) { ctx.moveTo(xx, yy); st = true; } else { ctx.lineTo(xx, yy); }
          }
          ctx.stroke();
        };
        drawSeries(c.turbs, 'rgba(46,160,67,.85)',   1.2 * sx);  // turbine vert
        drawSeries(c.devs,  'rgba(110,110,110,.85)', 1.2 * sx);  // deverse gris

        // Construire les points debit total (en sautant les nulls).
        const pts = [];
        for (let k = 0; k < N; k++) {
          const v = c.debits[k];
          if (v === null) { pts.push(null); }
          else { pts.push({ x: plotX + (k / (N - 1)) * plotW, y: yOf(v) }); }
        }
        // Courbe debit total (couleur du statut, trait epais — dominante).
        ctx.beginPath();
        ctx.strokeStyle = col.s;
        ctx.lineWidth = 1.5 * sx;
        let started = false;
        for (const p of pts) {
          if (p === null) { started = false; continue; }
          if (!started) { ctx.moveTo(p.x, p.y); started = true; } else { ctx.lineTo(p.x, p.y); }
        }
        ctx.stroke();
        // Point sur la valeur courante (halo blanc + remplissage couleur).
        const cur = pts[i];
        if (cur) {
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(cur.x, cur.y, 3.5 * sx, 0, 2 * Math.PI); ctx.fill();
          ctx.fillStyle = col.s;
          ctx.beginPath(); ctx.arc(cur.x, cur.y, 2.5 * sx, 0, 2 * Math.PI); ctx.fill();
        }
      }
    }
  }

  // ---- RESERVOIRS ----
  if (D.reservoirs && D.reservoirs.length) {
    const lwr = D.labelWRes * sx;
    const lhrFull = D.labelHRes * sy;
    const accent = 'rgba(40,110,200,.95)';
    const grayAcc = 'rgba(140,140,140,.95)';

    for (const r of D.reservoirs) {
      if (r.iconX === null || r.iconY === null || r.labelX === null || r.labelY === null) continue;
      const nivEff    = r.niveauxEff[i];
      const nivStale  = r.niveauxStale[i];
      const devEff    = r.devsEff[i];
      const devStale  = r.devsStale[i];
      const apportEff   = r.apportsEff[i];
      const apportStale = r.apportsStale[i];

      const expandedR = isExpandedRes(r);
      // Reservoirs : compact = nom + deversement (~65 px sur 145). Hauteur dynamique
      // pour eviter tout blanc inutile sous le contenu.
      const lhr = expandedR ? lhrFull : lhrFull * 0.45;

      const ix = r.iconX * sx, iy = r.iconY * sy;
      const lx = r.labelX * sx, ly = r.labelY * sy;

      // Ligne de rappel pointillee bleue (calcul avec lhr effectif). Couleur basee
      // sur la presence du deversement (donnee principale du reservoir maintenant).
      const lcx = lx + lwr/2, lcy = ly + lhr/2;
      const dx = ix - lcx, dy = iy - lcy;
      let ex = lcx, ey = lcy;
      if (Math.abs(dx) > Math.abs(dy) * (lwr/lhr)) { ex = dx>0 ? lx+lwr : lx; }
      else                                          { ey = dy>0 ? ly+lhr : ly; }
      ctx.save();
      ctx.setLineDash([3*sx, 3*sx]);
      ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(ix,iy);
      ctx.strokeStyle = devEff === null ? grayAcc : accent;
      ctx.lineWidth = 1.2*sx;
      ctx.stroke();
      ctx.restore();

      // Petite pastille sur l'icone.
      ctx.beginPath(); ctx.arc(ix,iy,4*sx,0,2*Math.PI);
      ctx.fillStyle = devEff === null ? grayAcc : accent;
      ctx.fill();

      // Fond etiquette + bordure (pas de barre statut sur les reservoirs).
      ctx.fillStyle='rgba(242,242,242,.95)';
      ctx.fillRect(lx, ly, lwr, lhr);
      ctx.strokeStyle = 'rgba(80,80,80,.6)'; ctx.lineWidth = .9*sx;
      ctx.strokeRect(lx, ly, lwr, lhr);

      const barW = 0;
      const leftX = lx + 8 * sx;
      const fsName  = Math.max(11, Math.round(17 * sx));
      const fsTotal = Math.max(10, Math.round(20 * sx));
      const fsIcon  = Math.max(12, Math.round(30 * sx));
      const fsDetail = Math.max(10, Math.round(16 * sx));
      const fontName  = 'bold ' + fsName  + 'px "Segoe UI",Arial,sans-serif';
      const fontTotal = 'bold ' + fsTotal + 'px "Segoe UI",Arial,sans-serif';
      const fontDetail = fsDetail + 'px "Segoe UI",Arial,sans-serif';
      const valCol = '#555';

      // Nom + fleche pliage en haut, suivi du trait separateur.
      // Positions calibrees pour lhrFull = 145 (ratios different des centrales car moins de lignes).
      // Icone "barrage" a meme taille que l'icone "centrale" cote centrale.
      const fsResIcon = Math.max(12, Math.round(fsName * 1.40));
      drawLeftSegments(ctx, [
        { icon: 'barrage', size: fsResIcon },
        { text: r.nom, color: '#111' }
      ], leftX, ly + lhrFull*0.10, fontName);
      const fsArrow = Math.max(18, Math.round(28 * sx));
      ctx.font = 'bold ' + fsArrow + 'px "Segoe UI",Arial,sans-serif';
      ctx.fillStyle = '#1a1a2e';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText(expandedR ? '▴' : '▾', lx + lwr - 6*sx, ly + lhrFull*0.10);
      const sepY = ly + lhrFull*0.22;
      ctx.beginPath();
      ctx.moveTo(leftX, sepY);
      ctx.lineTo(lx + lwr - 6*sx, sepY);
      ctx.strokeStyle = 'rgba(120,120,120,.55)';
      ctx.lineWidth = 0.8*sx;
      ctx.stroke();

      // Ligne 1 : deversement (donnee principale).
      // Si la valeur est stale (last-known), on ecrit "n/d" plutot que d'afficher
      // une valeur ancienne palie. Si vraiment aucune donnee jamais recue, on saute.
      if (devEff !== null) {
        const devTxt = devStale ? 'n/d' : (devEff + ' m³/s');
        drawLeftSegments(ctx, [
          { icon: 'deverse', size: fsIcon },
          { text: devTxt, color: valCol }
        ], leftX, ly + lhrFull*0.32, fontTotal);
      }

      // Lignes 2+ (apport, sparkline) : visibles seulement quand etendu.
      if (expandedR) {
        // Ligne 2 : apport.
        if (apportEff !== null) {
          ctx.save();
          if (apportStale) ctx.globalAlpha = 0.45;
          drawLeftSegments(ctx, [
            { icon: 'apport', size: fsIcon },
            { text: apportEff + ' m³/s', color: valCol }
          ], leftX, ly + lhrFull*0.50, fontDetail);
          ctx.restore();
        }

        // Sparkline DEVERSEMENT (bleu) + APPORT (vert), meme hauteur que les centrales.
        const sparkH = 45 * sy;
        const sparkBottomMargin = 4 * sy;
        const fsAxis = Math.max(8, Math.round(10 * sx));
        const yLabelW = fsAxis * 2.6;
        const xLabelH = fsAxis * 1.4;
        const plotX = lx + barW + 4 * sx;
        const plotY = ly + lhrFull - sparkH - sparkBottomMargin;
        const plotW = lwr - barW - 8 * sx - yLabelW;
        const plotH = sparkH - xLabelH;
        // Min/max combine (deversement + apport) pour partager l'echelle Y.
        let yMin = Infinity, yMax = -Infinity;
        for (const v of r.devs)    { if (v === null) continue; if (v < yMin) yMin = v; if (v > yMax) yMax = v; }
        for (const v of r.apports) { if (v === null) continue; if (v < yMin) yMin = v; if (v > yMax) yMax = v; }
        if (plotH > 6 && plotW > 10 && isFinite(yMin) && isFinite(yMax) && yMax > yMin) {
          const range = yMax - yMin;
          const yOf = v => plotY + plotH - ((v - yMin) / Math.max(range, 0.0001)) * plotH;
          // Bande "futur" en gris pale.
          const xFuture = plotX + ((i + 1) / (N - 1)) * plotW;
          if (xFuture < plotX + plotW) {
            ctx.fillStyle = 'rgba(150,150,160,.12)';
            ctx.fillRect(xFuture, plotY, plotX + plotW - xFuture, plotH);
          }
          // Axes Y et X.
          ctx.strokeStyle = 'rgba(80,80,90,.6)';
          ctx.lineWidth = 0.8 * sx;
          ctx.beginPath();
          ctx.moveTo(plotX, plotY);
          ctx.lineTo(plotX, plotY + plotH);
          ctx.lineTo(plotX + plotW, plotY + plotH);
          ctx.stroke();
          // Labels Y (max/min combines).
          ctx.font = fsAxis + 'px "Segoe UI",Arial,sans-serif';
          ctx.fillStyle = 'rgba(60,60,70,.85)';
          ctx.textAlign = 'left'; ctx.textBaseline = 'top';
          ctx.fillText(Math.round(yMax), plotX + plotW + 3 * sx, plotY);
          ctx.textBaseline = 'bottom';
          ctx.fillText(Math.round(yMin), plotX + plotW + 3 * sx, plotY + plotH);
          // Labels X (dates compactes).
          ctx.fillStyle = 'rgba(60,60,70,.75)';
          ctx.textBaseline = 'top';
          const xAxisY = plotY + plotH + 2 * sy;
          const tsFirst = D.timestamps[0] || '';
          const tsLast  = D.timestamps[D.timestamps.length - 1] || '';
          const compactX = (s) => {
            if (!s) return '';
            if (D.periode === 'mensuel') return s.split('-')[1] || s;
            const datePart = s.split(' ')[0];
            const m = datePart.match(/^\d{4}-(\d{2})-(\d{2})/);
            return m ? (m[1] + '-' + m[2]) : datePart;
          };
          ctx.textAlign = 'left';
          ctx.fillText(compactX(tsFirst), plotX + 1 * sx, xAxisY);
          ctx.textAlign = 'right';
          ctx.fillText(compactX(tsLast), plotX + plotW - 1 * sx, xAxisY);
          // ---- Courbe APPORT (vert) — stem-plot ----
          // L'apport est une donnee meteo/journaliere discrete (1 valeur publiee par
          // jour par HQ). On la trace comme un trait vertical de la base (0) jusqu'a
          // la valeur, separement pour chaque mesure. Pas de connexion entre les
          // mesures — sinon le canvas interpole et suggere une evolution continue
          // que la donnee n'a pas. Idem rendu pour les 4 vues (Heure/Jour/Sem/Mois).
          // Trace en arriere-plan pour que la courbe deversement passe par-dessus.
          const greenAccent = 'rgba(46,160,67,.85)';
          const y0 = yOf(yMin);   // base de l'echelle (souvent 0)
          ctx.strokeStyle = greenAccent;
          ctx.lineWidth = 1.3 * sx;
          ctx.beginPath();
          for (let k = 0; k < N; k++) {
            const v = r.apports[k];
            if (v == null || v <= 0) continue;
            const xx = plotX + (k / (N - 1)) * plotW;
            ctx.moveTo(xx, y0);
            ctx.lineTo(xx, yOf(v));
          }
          ctx.stroke();
          // ---- Courbe DEVERSEMENT (bleu, par-dessus) ----
          const ptsDev = [];
          for (let k = 0; k < N; k++) {
            const v = r.devs[k];
            if (v === null) { ptsDev.push(null); }
            else { ptsDev.push({ x: plotX + (k / (N - 1)) * plotW, y: yOf(v) }); }
          }
          ctx.beginPath();
          ctx.strokeStyle = accent;
          ctx.lineWidth = 1.5 * sx;
          let started = false;
          for (const p of ptsDev) {
            if (p === null) { started = false; continue; }
            if (!started) { ctx.moveTo(p.x, p.y); started = true; } else { ctx.lineTo(p.x, p.y); }
          }
          ctx.stroke();
          // Point sur la valeur courante (deversement).
          const cur = ptsDev[i];
          if (cur) {
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(cur.x, cur.y, 3.5 * sx, 0, 2 * Math.PI); ctx.fill();
            ctx.fillStyle = accent;
            ctx.beginPath(); ctx.arc(cur.x, cur.y, 2.5 * sx, 0, 2 * Math.PI); ctx.fill();
          }
        }
      }
    }
  }

  // ---- LEGENDE (dans la zone "LEGENDE" de l'image) ----
  if (D.legend) {
    const lgX  = D.legend.x * sx;
    const lgY  = D.legend.y * sy;
    const lgLh = D.legend.lineHeight * sy;
    const lgIs = Math.max(14, Math.round(D.legend.iconSize * sx));
    const lgFs = Math.max(10, Math.round(D.legend.fontSize * sx));
    const lgFont = lgFs + 'px "Segoe UI",Arial,sans-serif';
    const lgCol  = '#1a3060';
    const lgGap = Math.max(8, Math.round(12 * sx));
    // Ligne 1 : Debit total
    drawLeftSegments(ctx, [
      { icon: 'debit', size: lgIs },
      { gap: lgGap },
      { text: 'Débit total (m³/s)', color: lgCol }
    ], lgX, lgY, lgFont);
    // Ligne 2 : Turbine + Deverse sur la meme ligne (deverse legerement plus gros)
    const lgIsDev = Math.round(lgIs * 1.25);
    drawLeftSegments(ctx, [
      { icon: 'turbine-vert', size: lgIs },
      { gap: lgGap },
      { text: 'Turbiné', color: lgCol },
      { gap: Math.max(14, Math.round(20 * sx)) },
      { icon: 'deverse', size: lgIsDev },
      { gap: lgGap },
      { text: 'Déversé (m³/s)', color: lgCol }
    ], lgX, lgY + lgLh, lgFont);
    // Ligne 3 : Production
    drawLeftSegments(ctx, [
      { icon: 'eclair', size: lgIs },
      { gap: lgGap },
      { text: 'Électricité généré en megawatt', color: lgCol }
    ], lgX, lgY + 2 * lgLh, lgFont);
  }
}

function resize() {
  cv.width  = img.offsetWidth;
  cv.height = img.offsetHeight;
  if (D) draw(frame);
}

function go(i) {
  if (!D) return;
  frame = Math.max(0, Math.min(N-1, i));
  slider.value = frame;
  const ts = D.timestamps[frame];
  // Lazy load du mois precedent quand l'utilisateur s'approche du debut en vue Heure.
  // Seuil : dans les 10 % de gauche du slider, ou les 24 premieres frames.
  if (D.periode === 'horaire' && manifest && !isFetching) {
    const threshold = Math.max(24, Math.floor(N * 0.1));
    if (frame < threshold) maybeLoadPreviousMonth();
  }
  tsLabel.textContent = ts;
  // Mini-label au-dessus du slider : utile quand on a defile et que l'entete
  // n'est plus a l'ecran. Affiche la meme info que le titre, en plus discret.
  if (sliderTs) sliderTs.textContent = ts;
  fi.textContent = (frame+1)+' / '+N;
  draw(frame);
  // Bandeau resume general de la riviere (3 vues, change avec la frame).
  // Prefixe : "Faits saillants de [date]" (Heure/Jour) ou "Faits saillants de la
  // semaine [dimanche]" (Semaine). Date sans heure, semaine sans plage.
  if (riverBox && D.riverSummaries) {
    const txt = D.riverSummaries[frame];
    let label;
    if (D.periode === 'hebdomadaire') {
      const startOfWeek = ts.split(' ')[0];
      label = 'Faits saillants de la semaine ' + startOfWeek;
    } else if (D.periode === 'horaire') {
      label = 'Faits saillants de ' + ts.split(' ')[0];
    } else if (D.periode === 'mensuel') {
      label = 'Faits saillants du mois ' + ts;
    } else {
      label = 'Faits saillants de ' + ts;
    }
    const labelEsc = label.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    riverBox.innerHTML = '<span class="when">' + labelEsc + '</span>' + _renderInlineMarkdown(txt || '');
  }
  if (typeof modalIdx !== 'undefined' && modalIdx >= 0 && typeof drawBigChart === 'function') {
    drawBigChart();
  }
  if (typeof modalResIdx !== 'undefined' && modalResIdx >= 0 && typeof drawBigChartRes === 'function') {
    drawBigChartRes();
  }
}

}

// ----- Modal grand graphique au clic sur le sparkline d'une centrale -----
const hoverLayer = document.getElementById('hover-layer');
const modal      = document.getElementById('modal');
const modalCard  = document.getElementById('modal-card');
const modalClose = document.getElementById('modal-close');
const modalTitle = document.getElementById('modal-title');
const modalStats = document.getElementById('modal-stats');
const modalCv    = document.getElementById('modal-canvas');
const modalCtx   = modalCv.getContext('2d');

function imgCoordsFromEv(ev) {
  const r = img.getBoundingClientRect();
  return {
    x: (ev.clientX - r.left) * (img.naturalWidth  / r.width),
    y: (ev.clientY - r.top)  * (img.naturalHeight / r.height)
  };
}
// Renvoie l'index centrale dont le rectangle sparkline contient (xImg, yImg), sinon -1.
// Sparkline = 45 px de haut, 4 px de marge en bas (cf. draw()).
function hitTestSparkline(xImg, yImg) {
  const lh = D.labelH;
  const barW = 12;
  const sparkH = 45;
  const sparkBottomMargin = 4;
  for (let k = 0; k < D.centrales.length; k++) {
    const c = D.centrales[k];
    const lwC = c.labelW || D.labelW;
    const x0 = c.labelX + barW + 4;
    const x1 = c.labelX + lwC - 4;
    const y0 = c.labelY + lh - sparkH - sparkBottomMargin;
    const y1 = c.labelY + lh - sparkBottomMargin;
    if (xImg >= x0 && xImg <= x1 && yImg >= y0 && yImg <= y1) return k;
  }
  return -1;
}
// Zone cliquable pour basculer compact/etendu : haut du label (nom + debit total).
function hitTestLabelHeader(xImg, yImg) {
  const lh = D.labelH;
  for (let k = 0; k < D.centrales.length; k++) {
    const c = D.centrales[k];
    const lwC = c.labelW || D.labelW;
    if (xImg >= c.labelX && xImg <= c.labelX + lwC &&
        yImg >= c.labelY && yImg <= c.labelY + lh * 0.36) {
      return k;
    }
  }
  return -1;
}
// Pour les reservoirs : zone TOTALE de l'etiquette (compact ou etendu) cliquable.
// Comme le rectangle change de hauteur selon l'etat, on prend la zone visible reelle.
function hitTestReservoirHeader(xImg, yImg) {
  if (!D.reservoirs) return -1;
  const lwr = D.labelWRes, lhrFull = D.labelHRes;
  for (let k = 0; k < D.reservoirs.length; k++) {
    const r = D.reservoirs[k];
    if (r.iconX === null || r.iconY === null || r.labelX === null || r.labelY === null) continue;
    const expandedR = (compactMode['res:' + r.nom] === true);
    const lhr = expandedR ? lhrFull : lhrFull * 0.36;
    // Zone cliquable : haut du label (~36 % de la hauteur pleine).
    const hitH = lhrFull * 0.36;
    if (xImg >= r.labelX && xImg <= r.labelX + lwr &&
        yImg >= r.labelY && yImg <= r.labelY + hitH) {
      return k;
    }
  }
  return -1;
}
// Zone sparkline d'un reservoir etendu (45 px de haut, 4 px marge bas).
function hitTestReservoirSparkline(xImg, yImg) {
  if (!D.reservoirs) return -1;
  const lwr = D.labelWRes, lhrFull = D.labelHRes;
  const sparkH = 45;
  const sparkBottomMargin = 4;
  for (let k = 0; k < D.reservoirs.length; k++) {
    const r = D.reservoirs[k];
    if (r.iconX === null || r.iconY === null || r.labelX === null || r.labelY === null) continue;
    if (compactMode['res:' + r.nom] !== true) continue;   // sparkline visible seulement si etendu
    const x0 = r.labelX + 4;
    const x1 = r.labelX + lwr - 4;
    const y0 = r.labelY + lhrFull - sparkH - sparkBottomMargin;
    const y1 = r.labelY + lhrFull - sparkBottomMargin;
    if (xImg >= x0 && xImg <= x1 && yImg >= y0 && yImg <= y1) return k;
  }
  return -1;
}
hoverLayer.addEventListener('mousemove', (ev)=>{
  if (!D) { hoverLayer.style.cursor = 'default'; return; }
  const { x, y } = imgCoordsFromEv(ev);
  let cursor = 'default';
  if (hitTestLabelHeader(x, y) !== -1)         { cursor = 'pointer'; }
  else if (hitTestReservoirHeader(x, y) !== -1) { cursor = 'pointer'; }
  else {
    const kSpark = hitTestSparkline(x, y);
    if (kSpark !== -1 && isExpanded(D.centrales[kSpark])) cursor = 'pointer';
    else if (hitTestReservoirSparkline(x, y) !== -1)       cursor = 'pointer';
  }
  hoverLayer.style.cursor = cursor;
});
hoverLayer.addEventListener('click', (ev)=>{
  if (!D) return;
  const { x, y } = imgCoordsFromEv(ev);
  // Priorite 1 : clic sur en-tete d'une centrale -> bascule compact/etendu.
  const kHeader = hitTestLabelHeader(x, y);
  if (kHeader !== -1) {
    const c = D.centrales[kHeader];
    compactMode[c.id] = !isExpanded(c);
    draw(frame);
    return;
  }
  // Priorite 2 : clic sur en-tete d'un reservoir -> bascule compact/etendu.
  const kRes = hitTestReservoirHeader(x, y);
  if (kRes !== -1) {
    const r = D.reservoirs[kRes];
    const key = 'res:' + r.nom;
    compactMode[key] = !(compactMode[key] === true);
    draw(frame);
    return;
  }
  // Priorite 3 : clic sur la sparkline d'une centrale etendue -> ouvre la modale.
  const kSpark = hitTestSparkline(x, y);
  if (kSpark !== -1 && isExpanded(D.centrales[kSpark])) { openModal(kSpark); return; }
  // Priorite 4 : clic sur la sparkline d'un reservoir etendu -> ouvre la modale reservoir.
  const kResSpark = hitTestReservoirSparkline(x, y);
  if (kResSpark !== -1) { openModalRes(kResSpark); return; }
});

function fmtInt(v) { return (v == null) ? '—' : Math.round(v); }
function computeStats(arr) {
  let mn = Infinity, mx = -Infinity, sum = 0, n = 0;
  for (const v of arr) { if (v == null) continue; if (v < mn) mn = v; if (v > mx) mx = v; sum += v; n++; }
  return { min: n ? mn : null, max: n ? mx : null, avg: n ? sum / n : null, n };
}
function drawBigChart() {
  if (modalIdx < 0) return;
  const c = D.centrales[modalIdx];
  const arr = c.debits;
  const w = modalCv.width  = modalCv.clientWidth;
  const h = modalCv.height = modalCv.clientHeight;
  const cx = modalCtx;
  const pad = { l: 60, r: 20, t: 10, b: 36 };
  cx.clearRect(0, 0, w, h);

  // Echelle Y : max combine des 3 series (debit total, turbine, deverse) +
  // tampon ~5 % pour laisser de la place aux labels en haut.
  let yMaxRaw = (c.maxTotal && c.maxTotal > 0 ? c.maxTotal : 1);
  for (const v of c.turbs) { if (v != null && v > yMaxRaw) yMaxRaw = v; }
  for (const v of c.devs)  { if (v != null && v > yMaxRaw) yMaxRaw = v; }
  const yMax = yMaxRaw + Math.max(50, yMaxRaw * 0.05);
  // Echelle X : N frames + 3h "tampon" a droite pour laisser de la place aux labels
  const xPad = 3; // heures vides a droite
  const xSpan = (N - 1) + xPad;
  const innerW = w - pad.l - pad.r;
  const innerH = h - pad.t - pad.b;
  const xOf = i => pad.l + (i / xSpan) * innerW;
  const yOf = v => pad.t + (1 - v / yMax) * innerH;

  // Bande "futur" (i+1 .. N-1) en gris pale
  const xFut = xOf(frame + 1);
  if (xFut < pad.l + innerW) {
    cx.fillStyle = 'rgba(150,150,160,.18)';
    cx.fillRect(xFut, pad.t, pad.l + innerW - xFut, innerH);
  }

  // Grille horizontale (5 lignes) + ticks Y
  cx.strokeStyle = '#e3e6ef'; cx.lineWidth = 1;
  cx.fillStyle = '#666'; cx.font = '11px "Segoe UI",Arial';
  cx.textAlign = 'right'; cx.textBaseline = 'middle';
  for (let g = 0; g <= 5; g++) {
    const y = pad.t + (g / 5) * innerH;
    cx.beginPath(); cx.moveTo(pad.l, y); cx.lineTo(pad.l + innerW, y); cx.stroke();
    cx.fillText(Math.round(yMax * (1 - g / 5)) + ' m³/s', pad.l - 6, y);
  }

  // Ticks X : 5 dates reparties
  cx.fillStyle = '#666';
  cx.textAlign = 'center'; cx.textBaseline = 'top';
  for (let g = 0; g <= 4; g++) {
    const i = Math.round((g / 4) * (N - 1));
    const x = xOf(i);
    cx.fillText(D.timestamps[i], x, h - pad.b + 6);
  }

  // Couleur de la courbe = couleur statut courant (basee sur ratio min/max)
  let ratio = null;
  const dCur = arr[frame];
  if (dCur != null && c.minTotal != null && c.maxTotal != null && (c.maxTotal - c.minTotal) > 0) {
    ratio = (dCur - c.minTotal) / (c.maxTotal - c.minTotal) * 100;
  }
  let stroke = '#555';
  if (ratio != null) {
    if (ratio < 25) stroke = '#1a6e2a';
    else if (ratio < 50) stroke = '#7a6200';
    else if (ratio < 75) stroke = '#7a3a00';
    else stroke = '#6a0000';
  }

  // Couleurs fixes turbine (vert) + deverse (gris).
  const turbCol = 'rgba(46,160,67,.85)';
  const devCol  = 'rgba(110,110,110,.85)';
  const drawSeriesBig = (series, color, lw) => {
    cx.beginPath();
    cx.strokeStyle = color; cx.lineWidth = lw;
    let st = false;
    for (let i = 0; i < N; i++) {
      const v = series[i]; if (v == null) { st = false; continue; }
      const xx = xOf(i), yy = yOf(v);
      if (!st) { cx.moveTo(xx, yy); st = true; } else { cx.lineTo(xx, yy); }
    }
    cx.stroke();
  };
  // Trace turbine puis deverse en arriere-plan, puis le debit total dominant par-dessus.
  drawSeriesBig(c.turbs, turbCol, 2.2);
  drawSeriesBig(c.devs,  devCol,  2.2);

  // Courbe debit total (couleur statut, dominante)
  cx.beginPath();
  cx.strokeStyle = stroke; cx.lineWidth = 2.6;
  let started = false;
  for (let i = 0; i < N; i++) {
    const v = arr[i]; if (v == null) { started = false; continue; }
    const xx = xOf(i), yy = yOf(v);
    if (!started) { cx.moveTo(xx, yy); started = true; } else { cx.lineTo(xx, yy); }
  }
  cx.stroke();

  // Curseur vertical = frame courant
  const xCur = xOf(frame);
  cx.strokeStyle = 'rgba(200,40,40,.85)'; cx.lineWidth = 1.5;
  cx.beginPath(); cx.moveTo(xCur, pad.t); cx.lineTo(xCur, pad.t + innerH); cx.stroke();
  // Point sur la courbe
  if (dCur != null) {
    cx.fillStyle = stroke;
    cx.beginPath(); cx.arc(xCur, yOf(dCur), 4, 0, 2 * Math.PI); cx.fill();
    cx.fillStyle = '#222'; cx.font = 'bold 12px "Segoe UI",Arial';
    const valTxt = Math.round(dCur) + ' m³/s';
    const txtW = cx.measureText(valTxt).width;
    // Si le label depasse a droite, on le met a gauche du point
    const fitsRight = (xCur + 6 + txtW) <= (pad.l + innerW - 2);
    cx.textAlign = fitsRight ? 'left' : 'right';
    cx.textBaseline = 'bottom';
    cx.fillText(valTxt, xCur + (fitsRight ? 6 : -6), yOf(dCur) - 4);
  }

  // Legende dynamique : choisir le coin (HG/HD/BG/BD) qui chevauche le moins
  // la courbe debit total. Mesure les dimensions du bloc, puis compte combien
  // de points de la courbe tombent dans chaque coin candidat.
  const lgGapY = 18, lgSwW = 22, lgSwH = 7, lgPadX = 8, lgPadY = 6;
  const noteTxt = 'Débit total = turbiné + déversé.';
  cx.font = '12px "Segoe UI",Arial';
  const wTotal = cx.measureText('Débit total').width;
  const wTurb  = cx.measureText('Turbiné').width;
  const wDev   = cx.measureText('Déversé').width;
  cx.font = 'italic 11px "Segoe UI",Arial';
  const wNote  = cx.measureText(noteTxt).width;
  const lgInnerW = Math.max(wTotal, wTurb, wDev) + lgSwW + 8;
  const boxW = Math.max(lgInnerW, wNote) + 2 * lgPadX;
  const boxH = 3 * lgGapY + 14 + 2 * lgPadY; // 3 lignes legende + 1 ligne note
  // 4 coins candidats (origine du bloc x,y dans la zone de plot).
  const corners = [
    { name: 'HG', x: pad.l + 4,                  y: pad.t + 4 },
    { name: 'HD', x: pad.l + innerW - boxW - 4,  y: pad.t + 4 },
    { name: 'BG', x: pad.l + 4,                  y: pad.t + innerH - boxH - 4 },
    { name: 'BD', x: pad.l + innerW - boxW - 4,  y: pad.t + innerH - boxH - 4 }
  ];
  // Score : nombre de points de la courbe DEBIT TOTAL qui tombent dans le
  // rectangle ELARGI d'une marge de 8 px (compte aussi les points qui frolent
  // les bords). Le moins de chevauchement = meilleur coin. En cas d'egalite,
  // on choisit le coin le plus eloigne du curseur courant (xCur) pour ne pas
  // masquer la lecture en cours.
  const margin = 8;
  for (const co of corners) {
    let score = 0;
    const x0 = co.x - margin, x1 = co.x + boxW + margin;
    const y0 = co.y - margin, y1 = co.y + boxH + margin;
    for (let i2 = 0; i2 < N; i2++) {
      const v = c.debits[i2]; if (v == null) continue;
      const px = xOf(i2), py = yOf(v);
      if (px >= x0 && px <= x1 && py >= y0 && py <= y1) score++;
    }
    co.score = score;
    // Distance horizontale du centre du bloc au curseur courant (pour tie-break).
    co.distXCur = Math.abs((co.x + boxW / 2) - xCur);
  }
  // Tri : score croissant, puis distXCur decroissant (preferer eloigne du curseur).
  corners.sort((a, b) => (a.score - b.score) || (b.distXCur - a.distXCur));
  const best = corners[0];
  // Tracage du bloc.
  const lgX = best.x + lgPadX;
  const lgY0 = best.y + lgPadY;
  const lgTxtX = lgX + lgSwW + 8;
  cx.font = '12px "Segoe UI",Arial';
  cx.textAlign = 'left'; cx.textBaseline = 'top';
  cx.fillStyle = stroke;  cx.fillRect(lgX, lgY0 + 3,            lgSwW, lgSwH);
  cx.fillStyle = '#333';  cx.fillText('Débit total',  lgTxtX, lgY0);
  cx.fillStyle = turbCol; cx.fillRect(lgX, lgY0 + lgGapY + 3,   lgSwW, lgSwH);
  cx.fillStyle = '#333';  cx.fillText('Turbiné',      lgTxtX, lgY0 + lgGapY);
  cx.fillStyle = devCol;  cx.fillRect(lgX, lgY0 + 2*lgGapY + 3, lgSwW, lgSwH);
  cx.fillStyle = '#333';  cx.fillText('Déversé',      lgTxtX, lgY0 + 2*lgGapY);
  cx.font = 'italic 11px "Segoe UI",Arial';
  cx.fillStyle = '#666';
  cx.fillText(noteTxt, lgX, lgY0 + 3*lgGapY + 2);
}

function openModal(k) {
  modalIdx = k;
  const c = D.centrales[k];
  modalTitle.textContent = c.nom + ' — débit total';
  const s = computeStats(c.debits);
  const cur = c.debits[frame];
  modalStats.textContent =
    'Courant : ' + fmtInt(cur) + ' m³/s · ' +
    'Min : ' + fmtInt(s.min) + ' · ' +
    'Moy : ' + fmtInt(s.avg) + ' · ' +
    'Max : ' + fmtInt(s.max) + ' · ' +
    s.n + ' mesures';
  modal.classList.add('open');
  // Laisse le navigateur appliquer les dimensions avant de mesurer canvas
  requestAnimationFrame(drawBigChart);
}
function closeModal() {
  modal.classList.remove('open');
  modalIdx = -1;
  modalResIdx = -1;
}

// ----- Modale grand graphique pour un RESERVOIR : courbes deversement + apport -----
function openModalRes(k) {
  modalResIdx = k;
  modalIdx = -1;
  const r = D.reservoirs[k];
  modalTitle.textContent = r.nom + ' — déversement & précipitation';
  // Stats sur le deversement (signal principal du reservoir).
  const s = computeStats(r.devs);
  const cur = r.devs[frame];
  modalStats.textContent =
    'Déversement courant : ' + fmtInt(cur) + ' m³/s · ' +
    'Min : ' + fmtInt(s.min) + ' · ' +
    'Moy : ' + fmtInt(s.avg) + ' · ' +
    'Max : ' + fmtInt(s.max) + ' · ' +
    s.n + ' mesures';
  modal.classList.add('open');
  requestAnimationFrame(drawBigChartRes);
}

function drawBigChartRes() {
  if (modalResIdx < 0) return;
  const r = D.reservoirs[modalResIdx];
  const w = modalCv.width  = modalCv.clientWidth;
  const h = modalCv.height = modalCv.clientHeight;
  const cx = modalCtx;
  const pad = { l: 60, r: 20, t: 10, b: 36 };
  cx.clearRect(0, 0, w, h);

  // Echelle Y combinee (deversement + apport).
  let yMin = Infinity, yMax = -Infinity;
  for (const v of r.devs)    { if (v === null) continue; if (v < yMin) yMin = v; if (v > yMax) yMax = v; }
  for (const v of r.apports) { if (v === null) continue; if (v < yMin) yMin = v; if (v > yMax) yMax = v; }
  if (!isFinite(yMin) || !isFinite(yMax) || yMax <= yMin) { yMin = 0; yMax = 1; }
  const yTop = yMax + Math.max(10, yMax * 0.05);
  const yBot = Math.min(0, yMin);

  const xPad = 3;
  const xSpan = (N - 1) + xPad;
  const innerW = w - pad.l - pad.r;
  const innerH = h - pad.t - pad.b;
  const xOf = i => pad.l + (i / xSpan) * innerW;
  const yOf = v => pad.t + (1 - (v - yBot) / Math.max(yTop - yBot, 0.0001)) * innerH;

  // Bande "futur".
  const xFut = xOf(frame + 1);
  if (xFut < pad.l + innerW) {
    cx.fillStyle = 'rgba(150,150,160,.18)';
    cx.fillRect(xFut, pad.t, pad.l + innerW - xFut, innerH);
  }

  // Grille horizontale + ticks Y.
  cx.strokeStyle = '#e3e6ef'; cx.lineWidth = 1;
  cx.fillStyle = '#666'; cx.font = '11px "Segoe UI",Arial';
  cx.textAlign = 'right'; cx.textBaseline = 'middle';
  for (let g = 0; g <= 5; g++) {
    const y = pad.t + (g / 5) * innerH;
    cx.beginPath(); cx.moveTo(pad.l, y); cx.lineTo(pad.l + innerW, y); cx.stroke();
    const val = yTop - (g / 5) * (yTop - yBot);
    cx.fillText(Math.round(val) + ' m³/s', pad.l - 6, y);
  }

  // Ticks X : 5 dates reparties.
  cx.fillStyle = '#666';
  cx.textAlign = 'center'; cx.textBaseline = 'top';
  for (let g = 0; g <= 4; g++) {
    const i = Math.round((g / 4) * (N - 1));
    cx.fillText(D.timestamps[i], xOf(i), h - pad.b + 6);
  }

  // Courbe APPORT (vert, stem-plot — chaque mesure = trait vertical de 0 a la
  // valeur, sans interpolation entre les mesures). L'apport est journalier et
  // discret ; un trait continu suggererait une evolution continue trompeuse.
  const greenStroke = '#1a6e2a';
  const apportBaseY = yOf(0);
  cx.strokeStyle = greenStroke; cx.lineWidth = 2.2;
  cx.beginPath();
  for (let i = 0; i < N; i++) {
    const v = r.apports[i];
    if (v == null || v <= 0) continue;
    const xx = xOf(i);
    cx.moveTo(xx, apportBaseY);
    cx.lineTo(xx, yOf(v));
  }
  cx.stroke();

  // Courbe DEVERSEMENT (bleu, par-dessus).
  const blueStroke = '#1a3060';
  cx.beginPath();
  cx.strokeStyle = blueStroke; cx.lineWidth = 2.6;
  let started = false;
  for (let i = 0; i < N; i++) {
    const v = r.devs[i]; if (v === null) { started = false; continue; }
    const xx = xOf(i), yy = yOf(v);
    if (!started) { cx.moveTo(xx, yy); started = true; } else { cx.lineTo(xx, yy); }
  }
  cx.stroke();

  // Curseur vertical + point sur la frame courante (deversement).
  const xCur = xOf(frame);
  cx.strokeStyle = 'rgba(200,40,40,.85)'; cx.lineWidth = 1.5;
  cx.beginPath(); cx.moveTo(xCur, pad.t); cx.lineTo(xCur, pad.t + innerH); cx.stroke();
  const dCur = r.devs[frame];
  if (dCur != null) {
    cx.fillStyle = blueStroke;
    cx.beginPath(); cx.arc(xCur, yOf(dCur), 4, 0, 2 * Math.PI); cx.fill();
    cx.fillStyle = '#222'; cx.font = 'bold 12px "Segoe UI",Arial';
    const txt = Math.round(dCur) + ' m³/s';
    const txtW = cx.measureText(txt).width;
    const fitsRight = (xCur + 6 + txtW) <= (pad.l + innerW - 2);
    cx.textAlign = fitsRight ? 'left' : 'right';
    cx.textBaseline = 'bottom';
    cx.fillText(txt, xCur + (fitsRight ? 6 : -6), yOf(dCur) - 4);
  }

  // Legende couleurs en haut a gauche.
  cx.font = '12px "Segoe UI",Arial';
  cx.textAlign = 'left'; cx.textBaseline = 'top';
  cx.fillStyle = blueStroke;  cx.fillRect(pad.l + 4, pad.t + 5,  22, 7);
  cx.fillStyle = '#333';      cx.fillText('Déversement', pad.l + 32, pad.t + 0);
  cx.fillStyle = greenStroke; cx.fillRect(pad.l + 4, pad.t + 23, 22, 7);
  cx.fillStyle = '#333';      cx.fillText('Précipitation', pad.l + 32, pad.t + 18);
}

modalClose.addEventListener('click', closeModal);
modal.addEventListener('click', (ev)=>{ if (ev.target === modal) closeModal(); });
document.addEventListener('keydown', (ev)=>{ if (ev.key === 'Escape' && (modalIdx !== -1 || modalResIdx !== -1)) closeModal(); });
modalCv.addEventListener('click', (ev)=>{
  if (modalIdx < 0 && modalResIdx < 0) return;
  const r = modalCv.getBoundingClientRect();
  const xPix = (ev.clientX - r.left) * (modalCv.width / r.width);
  const pad = { l: 60, r: 20 };
  const innerW = modalCv.width - pad.l - pad.r;
  const t = (xPix - pad.l) / innerW;
  const f = Math.max(0, Math.min(N - 1, Math.round(t * (N - 1))));
  stop(); go(f);
  if (modalIdx >= 0) drawBigChart();
  else if (modalResIdx >= 0) drawBigChartRes();
});

window.addEventListener('resize', ()=>{
  if (modalIdx >= 0) drawBigChart();
  else if (modalResIdx >= 0) drawBigChartRes();
});

// Enregistrement du service worker (PWA installable). Silencieux si non supporte
// ou en file:// : ne doit jamais bloquer l'affichage.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js', { scope: './' }).catch(function () { /* ignore */ });
  });
}
</script>
</body>
