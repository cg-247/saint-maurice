function imgCoordsFromEv(ev) {
  const r = img.getBoundingClientRect();
  return {
    x: (ev.clientX - r.left) * (img.naturalWidth  / r.width),
    y: (ev.clientY - r.top)  * (img.naturalHeight / r.height)
  };
}
// Renvoie l'index centrale dont le rectangle sparkline contient (xImg, yImg), sinon -1.
// Sparkline = 45 px de haut, 4 px de marge en bas (cf. draw()).
function hitTestSparkline(xImg, yImg) {
  const lh = D.labelH;
  const barW = 12;
  const sparkH = 45;
  const sparkBottomMargin = 4;
  for (let k = 0; k < D.centrales.length; k++) {
    const c = D.centrales[k];
    const lwC = c.labelW || D.labelW;
    const x0 = c.labelX + barW + 4;
    const x1 = c.labelX + lwC - 4;
    const y0 = c.labelY + lh - sparkH - sparkBottomMargin;
    const y1 = c.labelY + lh - sparkBottomMargin;
    if (xImg >= x0 && xImg <= x1 && yImg >= y0 && yImg <= y1) return k;
  }
  return -1;
}
// Zone cliquable de l'indicateur turbine (centrale etendue) -> ouvre le modal turbines.
// Doit rester synchronisee avec le rendu (TURB_ROW_FRAC, leftX, taille).
function hitTestTurbineIcon(xImg, yImg) {
  const lh = D.labelH;
  const barW = 12;
  for (let k = 0; k < D.centrales.length; k++) {
    const c = D.centrales[k];
    if (!isExpanded(c) || !c.nb_groupes) continue;  // garde : etiquette visible + config turbine
    const lwC = c.labelW || D.labelW;
    const x0 = c.labelX + barW + 4;
    const x1 = c.labelX + lwC - 4;             // toute la largeur de la ligne indicateur
    const yMid = c.labelY + lh * TURB_ROW_FRAC;
    const half = lh * 0.085;                    // bande verticale autour de l'indicateur
    if (xImg >= x0 && xImg <= x1 && yImg >= yMid - half && yImg <= yMid + half) return k;
  }
  return -1;
}
// Zone cliquable pour fermer l'etiquette : toute la zone du header (nom).
function hitTestLabelHeader(xImg, yImg) {
  const lh = D.labelH;
  for (let k = 0; k < D.centrales.length; k++) {
    const c = D.centrales[k];
    if (!isVisible(c)) continue;
    const lwC = c.labelW || D.labelW;
    if (xImg >= c.labelX && xImg <= c.labelX + lwC &&
        yImg >= c.labelY && yImg <= c.labelY + lh * 0.20) {
      return k;
    }
  }
  return -1;
}
// Triangle toggle sur la carte (apres m3/s) : ouvre ou ferme l'etiquette.
function hitTestMapToggle(xImg, yImg) {
  for (let k = 0; k < D.centrales.length; k++) {
    const b = mapToggleBounds[k];
    if (!b) continue;
    if (xImg >= b.x0 && xImg <= b.x1 && yImg >= b.y0 && yImg <= b.y1) return k;
  }
  return -1;
}
// Pour les reservoirs : zone TOTALE de l'etiquette (compact ou etendu) cliquable.
// Comme le rectangle change de hauteur selon l'etat, on prend la zone visible reelle.
// Hit-test icone info des centrales (cercle de rayon r en coords image).
function hitTestInfoCentrale(xImg, yImg) {
  if (!D || !D.centrales) return -1;
  for (let k = 0; k < D.centrales.length; k++) {
    const b = infoCentBounds[k];
    if (!b) continue;
    const dx = xImg - b.x, dy = yImg - b.y;
    if (Math.sqrt(dx*dx + dy*dy) <= b.r) return k;
  }
  return -1;
}
// Hit-test icone info des reservoirs.
function hitTestInfoReservoir(xImg, yImg) {
  if (!D || !D.reservoirs) return -1;
  for (let k = 0; k < D.reservoirs.length; k++) {
    const b = infoResBounds[k];
    if (!b) continue;
    const dx = xImg - b.x, dy = yImg - b.y;
    if (Math.sqrt(dx*dx + dy*dy) <= b.r) return k;
  }
  return -1;
}

function hitTestReservoirHeader(xImg, yImg) {
  if (!D.reservoirs) return -1;
  const lwr = D.labelWRes, lhrFull = D.labelHRes;
  for (let k = 0; k < D.reservoirs.length; k++) {
    const r = D.reservoirs[k];
    if (r.iconX === null || r.iconY === null || r.labelX === null || r.labelY === null) continue;
    if (!isVisibleRes(r)) continue;
    const hitH = lhrFull * 0.22;
    if (xImg >= r.labelX && xImg <= r.labelX + lwr &&
        yImg >= r.labelY && yImg <= r.labelY + hitH) {
      return k;
    }
  }
  return -1;
}
// Triangle toggle sur la carte pour les reservoirs.
function hitTestMapToggleRes(xImg, yImg) {
  for (let k = 0; k < D.reservoirs.length; k++) {
    const b = mapToggleBoundsRes[k];
    if (!b) continue;
    if (xImg >= b.x0 && xImg <= b.x1 && yImg >= b.y0 && yImg <= b.y1) return k;
  }
  return -1;
}
// Zone sparkline d'un reservoir etendu (45 px de haut, 4 px marge bas).
function hitTestReservoirNiveauArrow(xImg, yImg) {
  if (!D.reservoirs) return -1;
  const lwr = D.labelWRes, lhrFull = D.labelHRes;
  for (let k = 0; k < D.reservoirs.length; k++) {
    const r = D.reservoirs[k];
    if (r.labelX === null || r.labelY === null) continue;
    if (!isExpandedRes(r)) continue;
    if (r.minNiv == null) continue;
    const lineY = r.labelY + lhrFull * 0.47;
    const x0 = r.labelX, x1 = r.labelX + lwr;
    const y0 = lineY - 10, y1 = lineY + 10;
    if (xImg >= x0 && xImg <= x1 && yImg >= y0 && yImg <= y1) return k;
  }
  return -1;
}
function hitTestReservoirSparkline(xImg, yImg) {
  if (!D.reservoirs) return -1;
  const lwr = D.labelWRes, lhrFull = D.labelHRes;
  const sparkH = 45;
  const sparkBottomMargin = 4;
  for (let k = 0; k < D.reservoirs.length; k++) {
    const r = D.reservoirs[k];
    if (r.iconX === null || r.iconY === null || r.labelX === null || r.labelY === null) continue;
    if (!isExpandedRes(r)) continue;   // sparkline visible seulement si etendu
    const x0 = r.labelX + 4;
    const x1 = r.labelX + lwr - 4;
    const y0 = r.labelY + lhrFull - sparkH - sparkBottomMargin;
    const y1 = r.labelY + lhrFull - sparkBottomMargin;
    if (xImg >= x0 && xImg <= x1 && yImg >= y0 && yImg <= y1) return k;
  }
  return -1;
}
hoverLayer.addEventListener('mousemove', (ev)=>{
  if (!D) { hoverLayer.style.cursor = 'default'; return; }
  const { x, y } = imgCoordsFromEv(ev);
  let cursor = 'default';
  if (hitTestInfoCentrale(x, y) !== -1)            { cursor = 'pointer'; }
  else if (hitTestInfoReservoir(x, y) !== -1)      { cursor = 'pointer'; }
  else if (hitTestMapToggle(x, y) !== -1)          { cursor = 'pointer'; }
  else if (hitTestMapToggleRes(x, y) !== -1)       { cursor = 'pointer'; }
  else if (hitTestLabelHeader(x, y) !== -1)        { cursor = 'pointer'; }
  else if (hitTestReservoirHeader(x, y) !== -1)    { cursor = 'pointer'; }
  else if (hitTestTurbineIcon(x, y) !== -1)      { cursor = 'pointer'; }
  else if (hitTestReservoirNiveauArrow(x, y) !== -1) { cursor = 'pointer'; }
  else {
    const kSpark = hitTestSparkline(x, y);
    if (kSpark !== -1 && isExpanded(D.centrales[kSpark])) cursor = 'pointer';
    else if (hitTestReservoirSparkline(x, y) !== -1)       cursor = 'pointer';
  }
  hoverLayer.style.cursor = cursor;
});
hoverLayer.addEventListener('click', (ev)=>{
  if (!D) return;
  const { x, y } = imgCoordsFromEv(ev);
  // Priorite 0 : clic sur icone info d'une centrale ou reservoir -> modale info.
  const kInfoC = hitTestInfoCentrale(x, y);
  if (kInfoC !== -1) { openInfoModalCentrale(kInfoC); return; }
  const kInfoR = hitTestInfoReservoir(x, y);
  if (kInfoR !== -1) { openInfoModalReservoir(kInfoR); return; }

  // Priorite 0b : clic sur le triangle toggle sur la carte -> ouvre ou ferme l'etiquette.
  const kToggle = hitTestMapToggle(x, y);
  if (kToggle !== -1) {
    const c = D.centrales[kToggle];
    setLabelState(c, isVisible(c) ? 'hidden' : 'expanded');
    return;
  }
  // Priorite 1 : clic sur l'en-tete de l'etiquette -> ferme l'etiquette.
  const kHeader = hitTestLabelHeader(x, y);
  if (kHeader !== -1) {
    const c = D.centrales[kHeader];
    setLabelState(c, 'hidden');
    return;
  }
  // Priorite 1b : clic sur le triangle toggle reservoir sur la carte.
  const kToggleRes = hitTestMapToggleRes(x, y);
  if (kToggleRes !== -1) {
    setLabelState(D.reservoirs[kToggleRes], isVisibleRes(D.reservoirs[kToggleRes]) ? 'hidden' : 'expanded');
    return;
  }
  // Priorite 2 : clic sur en-tete d'un reservoir -> ferme l'etiquette.
  const kRes = hitTestReservoirHeader(x, y);
  if (kRes !== -1) {
    setLabelState(D.reservoirs[kRes], 'hidden');
    return;
  }
  // Priorite 3 : clic sur l'indicateur turbine d'une centrale etendue -> modal turbines.
  const kTurb = hitTestTurbineIcon(x, y);
  if (kTurb !== -1) { openTurbineModal(kTurb); return; }
  // Priorite 3b : clic sur triangle niveau d'un reservoir etendu -> modal niveau.
  const kNivArrow = hitTestReservoirNiveauArrow(x, y);
  if (kNivArrow !== -1) { openModalNivRes(kNivArrow); return; }
  // Priorite 4 : clic sur la sparkline d'une centrale etendue -> ouvre la modale.
  const kSpark = hitTestSparkline(x, y);
  if (kSpark !== -1 && isExpanded(D.centrales[kSpark])) { openModal(kSpark); return; }
  // Priorite 4 : clic sur la sparkline d'un reservoir etendu -> ouvre la modale reservoir.
  const kResSpark = hitTestReservoirSparkline(x, y);
  if (kResSpark !== -1) { openModalRes(kResSpark); return; }
});

function fmtInt(v) { return (v == null) ? '—' : Math.round(v); }
function computeStats(arr) {
  let mn = Infinity, mx = -Infinity, sum = 0, n = 0;
  for (const v of arr) { if (v == null) continue; if (v < mn) mn = v; if (v > mx) mx = v; sum += v; n++; }
  return { min: n ? mn : null, max: n ? mx : null, avg: n ? sum / n : null, n };
}
function drawBigChart() {
  if (modalIdx < 0) return;
  const c = D.centrales[modalIdx];
  const arr = c.debits;
  const w = modalCv.width  = modalCv.clientWidth;
  const h = modalCv.height = modalCv.clientHeight;
  const cx = modalCtx;
  const pad = { l: 60, r: 20, t: 10, b: 36 };
  cx.clearRect(0, 0, w, h);

  // Echelle Y : max combine des 3 series (debit total, turbine, deverse) +
  // tampon ~5 % pour laisser de la place aux labels en haut.
  let yMaxRaw = (c.maxTotal && c.maxTotal > 0 ? c.maxTotal : 1);
  for (const v of c.turbs) { if (v != null && v > yMaxRaw) yMaxRaw = v; }
  for (const v of c.devs)  { if (v != null && v > yMaxRaw) yMaxRaw = v; }
  const yMax = yMaxRaw + Math.max(50, yMaxRaw * 0.05);
  // Echelle X : N frames + 3h "tampon" a droite pour laisser de la place aux labels
  const xPad = 3; // heures vides a droite
  const xSpan = (N - 1) + xPad;
  const innerW = w - pad.l - pad.r;
  const innerH = h - pad.t - pad.b;
  const xOf = i => pad.l + (i / xSpan) * innerW;
  const yOf = v => pad.t + (1 - v / yMax) * innerH;

  // Bande "futur" (i+1 .. N-1) en gris pale
  const xFut = xOf(frame + 1);
  if (xFut < pad.l + innerW) {
    cx.fillStyle = 'rgba(150,150,160,.18)';
    cx.fillRect(xFut, pad.t, pad.l + innerW - xFut, innerH);
  }

  // Grille horizontale (5 lignes) + ticks Y
  cx.strokeStyle = '#e3e6ef'; cx.lineWidth = 1;
  cx.fillStyle = '#666'; cx.font = '11px "Segoe UI",Arial';
  cx.textAlign = 'right'; cx.textBaseline = 'middle';
  for (let g = 0; g <= 5; g++) {
    const y = pad.t + (g / 5) * innerH;
    cx.beginPath(); cx.moveTo(pad.l, y); cx.lineTo(pad.l + innerW, y); cx.stroke();
    cx.fillText(Math.round(yMax * (1 - g / 5)) + ' m³/s', pad.l - 6, y);
  }

  // Ticks X : 5 dates reparties
  cx.fillStyle = '#666';
  cx.textAlign = 'center'; cx.textBaseline = 'top';
  for (let g = 0; g <= 4; g++) {
    const i = Math.round((g / 4) * (N - 1));
    const x = xOf(i);
    cx.fillText(D.timestamps[i], x, h - pad.b + 6);
  }

  // Couleur de la courbe = couleur statut courant (basee sur ratio min/max)
  let ratio = null;
  const dCur = arr[frame];
  if (dCur != null && c.minTotal != null && c.maxTotal != null && (c.maxTotal - c.minTotal) > 0) {
    ratio = (dCur - c.minTotal) / (c.maxTotal - c.minTotal) * 100;
  }
  let stroke = '#555';
  if (ratio != null) {
    if (ratio < 25) stroke = '#1a6e2a';
    else if (ratio < 50) stroke = '#7a6200';
    else if (ratio < 75) stroke = '#7a3a00';
    else stroke = '#6a0000';
  }

  // Couleurs fixes turbine (vert) + deverse (gris).
  const turbCol = 'rgba(46,160,67,.85)';
  const devCol  = 'rgba(110,110,110,.85)';
  const drawSeriesBig = (series, color, lw) => {
    cx.beginPath();
    cx.strokeStyle = color; cx.lineWidth = lw;
    let st = false;
    for (let i = 0; i < N; i++) {
      const v = series[i]; if (v == null) { st = false; continue; }
      const xx = xOf(i), yy = yOf(v);
      if (!st) { cx.moveTo(xx, yy); st = true; } else { cx.lineTo(xx, yy); }
    }
    cx.stroke();
  };
  // Trace turbine puis deverse en arriere-plan, puis le debit total dominant par-dessus.
  drawSeriesBig(c.turbs, turbCol, 2.2);
  drawSeriesBig(c.devs,  devCol,  2.2);

  // Courbe debit total (couleur statut, dominante)
  cx.beginPath();
  cx.strokeStyle = stroke; cx.lineWidth = 2.6;
  let started = false;
  for (let i = 0; i < N; i++) {
    const v = arr[i]; if (v == null) { started = false; continue; }
    const xx = xOf(i), yy = yOf(v);
    if (!started) { cx.moveTo(xx, yy); started = true; } else { cx.lineTo(xx, yy); }
  }
  cx.stroke();

  // Curseur vertical = frame courant
  const xCur = xOf(frame);
  cx.strokeStyle = 'rgba(200,40,40,.85)'; cx.lineWidth = 1.5;
  cx.beginPath(); cx.moveTo(xCur, pad.t); cx.lineTo(xCur, pad.t + innerH); cx.stroke();
  // Point sur la courbe
  if (dCur != null) {
    cx.fillStyle = stroke;
    cx.beginPath(); cx.arc(xCur, yOf(dCur), 4, 0, 2 * Math.PI); cx.fill();
    cx.fillStyle = '#222'; cx.font = 'bold 12px "Segoe UI",Arial';
    const valTxt = Math.round(dCur) + ' m³/s';
    const txtW = cx.measureText(valTxt).width;
    // Si le label depasse a droite, on le met a gauche du point
    const fitsRight = (xCur + 6 + txtW) <= (pad.l + innerW - 2);
    cx.textAlign = fitsRight ? 'left' : 'right';
    cx.textBaseline = 'bottom';
    cx.fillText(valTxt, xCur + (fitsRight ? 6 : -6), yOf(dCur) - 4);
  }

  // Legende dynamique : choisir le coin (HG/HD/BG/BD) qui chevauche le moins
  // la courbe debit total. Mesure les dimensions du bloc, puis compte combien
  // de points de la courbe tombent dans chaque coin candidat.
  const lgGapY = 18, lgSwW = 22, lgSwH = 7, lgPadX = 8, lgPadY = 6;
  const noteTxt = 'Débit total = turbiné + déversé.';
  cx.font = '12px "Segoe UI",Arial';
  const wTotal = cx.measureText('Débit total').width;
  const wTurb  = cx.measureText('Turbiné').width;
  const wDev   = cx.measureText('Déversé').width;
  cx.font = 'italic 11px "Segoe UI",Arial';
  const wNote  = cx.measureText(noteTxt).width;
  const lgInnerW = Math.max(wTotal, wTurb, wDev) + lgSwW + 8;
  const boxW = Math.max(lgInnerW, wNote) + 2 * lgPadX;
  const boxH = 3 * lgGapY + 14 + 2 * lgPadY; // 3 lignes legende + 1 ligne note
  // 4 coins candidats (origine du bloc x,y dans la zone de plot).
  const corners = [
    { name: 'HG', x: pad.l + 4,                  y: pad.t + 4 },
    { name: 'HD', x: pad.l + innerW - boxW - 4,  y: pad.t + 4 },
    { name: 'BG', x: pad.l + 4,                  y: pad.t + innerH - boxH - 4 },
    { name: 'BD', x: pad.l + innerW - boxW - 4,  y: pad.t + innerH - boxH - 4 }
  ];
  // Score : nombre de points de la courbe DEBIT TOTAL qui tombent dans le
  // rectangle ELARGI d'une marge de 8 px (compte aussi les points qui frolent
  // les bords). Le moins de chevauchement = meilleur coin. En cas d'egalite,
  // on choisit le coin le plus eloigne du curseur courant (xCur) pour ne pas
  // masquer la lecture en cours.
  const margin = 8;
  for (const co of corners) {
    let score = 0;
    const x0 = co.x - margin, x1 = co.x + boxW + margin;
    const y0 = co.y - margin, y1 = co.y + boxH + margin;
    for (let i2 = 0; i2 < N; i2++) {
      const v = c.debits[i2]; if (v == null) continue;
      const px = xOf(i2), py = yOf(v);
      if (px >= x0 && px <= x1 && py >= y0 && py <= y1) score++;
    }
    co.score = score;
    // Distance horizontale du centre du bloc au curseur courant (pour tie-break).
    co.distXCur = Math.abs((co.x + boxW / 2) - xCur);
  }
  // Tri : score croissant, puis distXCur decroissant (preferer eloigne du curseur).
  corners.sort((a, b) => (a.score - b.score) || (b.distXCur - a.distXCur));
  const best = corners[0];
  // Tracage du bloc.
  const lgX = best.x + lgPadX;
  const lgY0 = best.y + lgPadY;
  const lgTxtX = lgX + lgSwW + 8;
  cx.font = '12px "Segoe UI",Arial';
  cx.textAlign = 'left'; cx.textBaseline = 'top';
  cx.fillStyle = stroke;  cx.fillRect(lgX, lgY0 + 3,            lgSwW, lgSwH);
  cx.fillStyle = '#333';  cx.fillText('Débit total',  lgTxtX, lgY0);
  cx.fillStyle = turbCol; cx.fillRect(lgX, lgY0 + lgGapY + 3,   lgSwW, lgSwH);
  cx.fillStyle = '#333';  cx.fillText('Turbiné',      lgTxtX, lgY0 + lgGapY);
  cx.fillStyle = devCol;  cx.fillRect(lgX, lgY0 + 2*lgGapY + 3, lgSwW, lgSwH);
  cx.fillStyle = '#333';  cx.fillText('Déversé',      lgTxtX, lgY0 + 2*lgGapY);
  cx.font = 'italic 11px "Segoe UI",Arial';
  cx.fillStyle = '#666';
  cx.fillText(noteTxt, lgX, lgY0 + 3*lgGapY + 2);
}

function openModal(k) {
  modalIdx = k;
  modalTurbIdx = -1; modalResIdx = -1; modalNivResIdx = -1;
  modalNote.innerHTML = ''; modalTable.innerHTML = '';
  const c = D.centrales[k];
  modalTitle.textContent = c.nom + ' — débit total';
  const s = computeStats(c.debits);
  const cur = c.debits[frame];
  modalStats.textContent =
    'Courant : ' + fmtInt(cur) + ' m³/s · ' +
    'Min : ' + fmtInt(s.min) + ' · ' +
    'Moy : ' + fmtInt(s.avg) + ' · ' +
    'Max : ' + fmtInt(s.max) + ' · ' +
    s.n + ' mesures';
  modal.classList.add('open');
  // Laisse le navigateur appliquer les dimensions avant de mesurer canvas
  requestAnimationFrame(drawBigChart);
}
// ===== MODALE INFO CEHQ (centrales et reservoirs) =====
function buildCehqTable(src) {
  const tdL = 'style="padding:3px 14px 3px 0;color:#555;font-size:13px;white-space:nowrap;vertical-align:top"';
  const tdV = 'style="padding:3px 18px 3px 0;font-weight:600;color:#1a1a2e;font-size:13px;vertical-align:top"';
  const tdNote = 'style="padding:1px 0 5px;color:#888;font-size:11px;font-style:italic" colspan="4"';
  const secH = 'style="font-size:13px;font-weight:700;color:#1a1a2e;' +
               'padding:20px 0 5px;border-top:2px solid #ddd"';
  const row2 = (l1, v1, l2, v2) =>
    '<tr><td ' + tdL + '>' + l1 + '</td><td ' + tdV + '>' + v1 + '</td>' +
         '<td ' + tdL + '>' + l2 + '</td><td ' + tdV + '>' + v2 + '</td></tr>';
  const row1 = (l1, v1) =>
    '<tr><td ' + tdL + '>' + l1 + '</td><td ' + tdV + ' colspan="3">' + v1 + '</td></tr>';
  const noteRow = (txt) => '<tr><td ' + tdNote + '>' + txt + '</td></tr>';
  const secRow = (label) => '<tr><td ' + secH + ' colspan="4">' + label + '</td></tr>';
  const fmtMillion = v => v != null ? (v / 1e6).toFixed(1).replace('.', ',') + ' Mm³' : '—';
  const fmtHa = v => v != null ? v.toLocaleString('fr-CA') + ' ha' : '—';
  const fmtKm2 = v => v != null ? v.toLocaleString('fr-CA') + ' km²' : '—';
  const fmtM = v => v != null ? String(v).replace('.', ',') + ' m' : '—';
  const fmtStr = v => v || '—';
  const classeDesc = {
    'A': 'Grande hauteur ou grande capacité',
    'B': 'Hauteur ou capacité importante',
    'C': 'Hauteur ou capacité modérée',
    'D': 'Petit ouvrage'
  };
  const conseqDesc = {
    'Tres important': 'Pertes de vies probables, dommages majeurs en aval',
    'Considerable':   'Pertes de vies possibles, dommages significatifs',
    'Important':      'Pertes de vies peu probables, dommages notables',
    'Moyen':          'Aucune perte de vie anticipée, dommages limités'
  };
  const entries = src.barrages ? src.barrages : [src];
  const multi = entries.length > 1;
  // Helpers pills (définis une seule fois hors du forEach)
  const classeKeys = ['A','B','C','D'];
  const classeColors = { 'A':'#b91c1c', 'B':'#c2410c', 'C':'#0369a1', 'D':'#15803d' };
  const conseqKeys = ['Tres important','Considerable','Important','Moyen'];
  const conseqLabels = { 'Tres important':'Très important', 'Considerable':'Considérable', 'Important':'Important', 'Moyen':'Moyen' };
  const conseqColors = { 'Tres important':'#7f1d1d', 'Considerable':'#b91c1c', 'Important':'#d97706', 'Moyen':'#15803d' };
  const pillBase = 'display:inline-block;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:700;margin:2px 3px 2px 0;';
  const pillActive = (col) => pillBase + 'background:' + col + ';color:#fff;';
  const pillInactive = pillBase + 'background:#f0f0f0;color:#aaa;';
  const pillRow = (label, pills, note) =>
    '<tr><td style="padding:12px 10px 4px 0;color:#555;font-size:13px;white-space:nowrap;vertical-align:middle">' + label + '</td>' +
    '<td colspan="3" style="padding:10px 0 6px">' + pills +
    (note ? '<div style="font-size:11px;color:#666;font-style:italic;margin-top:2px">' + note + '</div>' : '') +
    '</td></tr>';
  // Génère le contenu d'un panneau barrage
  function barragePanel(b) {
    const annee = b.annee_construction != null
      ? (b.annee_modification != null ? b.annee_construction + ' (mod. ' + b.annee_modification + ')' : String(b.annee_construction))
      : '—';
    const municipalite = b.municipalite || src.municipalite || null;
    const classeVal = b.classe || '';
    const conseqVal = b.niveau_consequences || '';
    let classePills = '';
    classeKeys.forEach(function(k) {
      const col = classeColors[k] || '#555';
      classePills += '<span style="' + (k === classeVal ? pillActive(col) : pillInactive) + '">' + k + '</span>';
    });
    let conseqPills = '';
    conseqKeys.forEach(function(k) {
      const col = conseqColors[k] || '#555';
      const label = conseqLabels[k] || k;
      conseqPills += '<span style="' + (k === conseqVal ? pillActive(col) : pillInactive) + '">' + label + '</span>';
    });
    return '<table style="border-collapse:collapse;width:100%">' +
      secRow('Général') +
      row2('Année construction', annee, 'Municipalité', fmtStr(municipalite)) +

      pillRow('Classe', classePills, classeDesc[classeVal] || '') +
      pillRow('Conséquences rupture', conseqPills, conseqDesc[conseqVal] || '') +
      '<tr><td colspan="4" style="padding-bottom:10px"></td></tr>' +
      secRow('Technique') +
      row2('Hauteur du barrage', fmtM(b.hauteur_aval_m), 'Largeur du barrage', fmtM(b.longueur_m)) +
      (b.hauteur_retenue_m != null ? row1('Hauteur retenue', fmtM(b.hauteur_retenue_m)) : '') +
      row2('Bassin versant', fmtKm2(b.sup_bassin_km2), 'Superficie réservoir', fmtHa(b.sup_reservoir_ha)) +
      row1('Capacité retenue', fmtMillion(b.capacite_retenue_m3)) +
      '</table>';
  }
  // ID unique pour isoler les onglets (évite collisions si deux modales ouvertes)
  const tabNs = 'cehq-tab-' + Math.random().toString(36).slice(2, 7);
  let html = '';
  if (!multi) {
    html = barragePanel(entries[0]);
  } else {
    // Barre d'onglets
    const tabBarStyle = 'display:flex;gap:4px;margin-bottom:14px;border-bottom:2px solid #e5e7eb;padding-bottom:0;';
    const tabActiveStyle = 'padding:7px 16px;border-radius:6px 6px 0 0;font-size:13px;font-weight:700;cursor:pointer;background:#1a1a2e;color:#fff;border:none;margin-bottom:-2px;';
    const tabInactiveStyle = 'padding:7px 16px;border-radius:6px 6px 0 0;font-size:13px;font-weight:600;cursor:pointer;background:#f3f4f6;color:#555;border:none;margin-bottom:-2px;';
    let tabs = '<div style="' + tabBarStyle + '">';
    let panels = '';
    entries.forEach(function(b, bi) {
      const label = b.nom_barrage || ('Barrage ' + (bi + 1));
      const panelId = tabNs + '-panel-' + bi;
      const btnId   = tabNs + '-btn-'   + bi;
      const isFirst = bi === 0;
      tabs += '<button id="' + btnId + '" onclick="(function(){'  +
        'var ns=\'' + tabNs + '\',n=' + entries.length + ';' +
        'for(var i=0;i<n;i++){' +
          'document.getElementById(ns+\'-panel-\'+i).style.display=i===' + bi + '?\'block\':\'none\';' +
          'document.getElementById(ns+\'-btn-\'+i).style.cssText=i===' + bi + '?\'' + tabActiveStyle.replace(/'/g, "\\'") + '\':\'' + tabInactiveStyle.replace(/'/g, "\\'") + '\';}' +
        '})()" style="' + (isFirst ? tabActiveStyle : tabInactiveStyle) + '">' + label + '</button>';
      panels += '<div id="' + panelId + '" style="display:' + (isFirst ? 'block' : 'none') + '">' + barragePanel(b) + '</div>';
    });
    tabs += '</div>';
    html = tabs + panels;
  }
  return html;
}

    'Moy : ' + fmtInt(s.avg) + ' · ' +
    'Max : ' + fmtInt(s.max) + ' · ' +
    s.n + ' mesures';
  modal.classList.add('open');
  requestAnimationFrame(drawBigChartRes);
}

// ----- Modale TURBINES : N icones en grand, charge par groupe (empilement estime) -----
function openTurbineModal(k) {
  modalTurbIdx = k;
  modalIdx = -1;
  modalResIdx = -1;
  const c = D.centrales[k];
  const turb = c.turbsEff[frame];
  const agg = turbineAggregate(c, turb);
  const type = c.type_turbine || c.famille_turbine || '?';
  modalTitle.textContent = c.nom + ' — turbines ' + type;

  // Phrase lisible (pas de jargon turbiné x/y).
  const N = agg.N, kf = agg.k, arret = N - kf;
  let phrase;
  if (kf === 0) {
    phrase = "Cette centrale possède <b>" + N + " turbines</b>, actuellement <b>toutes à l'arrêt</b>.";
  } else if (arret === 0) {
    phrase = 'Cette centrale possède <b>' + N + ' turbines</b> et elles sont <b>toutes en fonction</b>.';
  } else {
    phrase = 'Cette centrale possède <b>' + N + ' turbines</b> : <b>' + kf + ' en fonction</b> et <b>' + arret + ' à l\'arrêt</b>.';
  }
  if (agg.surcharge) {
    phrase += ' <span style="color:#c25a00"><b>Surcharge</b> : les groupes en service dépassent leur régime nominal.</span>';
  }
  modalStats.innerHTML = phrase;

  // Note de reconstruction (bas a gauche) : explique comment la conduite est geree
  // selon le type de turbine. Detaillee, sans mentionner le detail de publication HQ.
  const plancherTxt = (c.famille_turbine === 'Francis') ? '50 %' : '25 %';
  let explic;
  if (c.famille_turbine === 'Francis') {
    explic = 'Les turbines <b>Francis</b> ont une plage de rendement assez limitée : sous '
           + '~' + plancherTxt + ' de leur débit nominal, elles vibrent et caviteront. '
           + 'Un opérateur évite donc de les faire tourner à bas régime — il préfère <b>arrêter '
           + 'des turbines</b> et faire travailler les autres dans leur zone optimale (~85 %.)';
  } else {
    explic = "Les turbines <b>Kaplan</b> gardent un bon rendement sur une plage, jusqu'à ~" + plancherTxt + " du débit nominal. Elles tolèrent les variations. "
           + 'On arrête tout de même des turbines pour rester près de la zone optimale (~85 %).';
  }
  const noteSurcharge = agg.surcharge
    ? '<br><b style="color:#c25a00">Surcharge</b> : certaines turbines dépassent leur régime nominal.'
    : '<br>Une turbine peut tourner en légère surcharge (~+10 % au-delà de 100 %).';
  modalNote.innerHTML = explic + noteSurcharge;
  // Tableau puissance : chute spec, chute actuelle, debit turbine, rendement, formule P.
  (function() {
    const eta = (c.famille_turbine === 'Francis') ? 0.90 : 0.92;
    const turb = c.turbsEff[frame];
    const amontV = (c.amonts && c.amonts[frame] != null) ? c.amonts[frame] : null;
    const avalV  = (c.avals  && c.avals[frame]  != null) ? c.avals[frame]  : null;
    const hAct   = (amontV !== null && avalV !== null) ? Math.round((amontV - avalV) * 100) / 100 : null;
    // Chute de reference estimee : H_ref = cap_mw * 1000 / (9.81 * cap * eta)
    const hRef   = (c.cap_mw && c.cap) ? Math.round(c.cap_mw * 1000 / (9.81 * c.cap * eta) * 10) / 10 : null;
    const pCalc  = (turb !== null && hAct !== null) ? Math.round(9.81 * turb * hAct * eta / 1000) : null;
    const fmtN   = v => v != null ? v : '—';
    const tdS    = 'style="padding:3px 10px 3px 0;color:#555;font-size:13px"';
    const tdV    = 'style="padding:3px 10px 3px 0;font-weight:600;color:#1a1a2e;font-size:13px"';
    const row = (label, val, unit) =>
      '<tr><td ' + tdS + '>' + label + '</td><td ' + tdV + '>' + fmtN(val) + (unit ? ' ' + unit : '') + '</td></tr>';
    const formuleTxt = (turb !== null && hAct !== null)
      ? fmtN(pCalc) + (c.cap_mw ? ' / ' + c.cap_mw + ' MW (' + Math.round(pCalc/c.cap_mw*100) + ' %)' : ' MW')
      : '9,81 &times; Q &times; H &times; &eta;';
    const tbl =
      '<table style="margin-top:10px;border-collapse:collapse">' +

      row('D&eacute;bit turbin&eacute;', turb, 'm&sup3;/s') +
      row('Hauteur chute', hRef, 'm') +
      row('Niveau (amont &minus; aval)', hAct !== null ? hAct : null, hAct !== null ? 'm (' + amontV + ' &minus; ' + avalV + ')' : 'm') +
      row('Rendement &eta;', eta, '') +
      '<tr><td ' + tdS + '>Puissance estim&eacute;e<br><span style="font-size:11px;color:#aaa">(P = 9,81 &times; Q &times; H &times; &eta; / 1 000)</span></td>' +
      '<td colspan="2" ' + tdV + '>' + formuleTxt + '</td></tr>' +
      '</table>';

    modalTable.innerHTML = tbl;
  })();
  modal.classList.add('open');
  requestAnimationFrame(drawTurbineModal);
}

function drawTurbineModal() {
  if (modalTurbIdx < 0) return;
  const c = D.centrales[modalTurbIdx];
  const turb = c.turbsEff[frame];
  const w = modalCv.width  = modalCv.clientWidth;
  const h = modalCv.height = modalCv.clientHeight;
  const cx = modalCtx;
  cx.clearRect(0, 0, w, h);
  const units = turbineUnits(c, turb);   // 1 section, ou Shawinigan-2 / Shawinigan-3
  const name = (c.famille_turbine === 'Francis') ? 'turbine-francis' : 'turbine-kaplan';
  const turbIm = iconImgs[name];
  const pad = 24;
  const sectionGap = 28;
  const labelH = 28;          // place sous chaque icone pour le % (texte 18px gras)
  const titleH = units.length > 1 ? 24 : 0;
  const gap = 12;
  // Hauteur dispo par section.
  const secH = (h - pad*2 - sectionGap*(units.length-1)) / units.length;
  // Taille d'icone ABSOLUE et FIXE pour TOUS les modals : calee sur la rangee la plus
  // chargee du projet (Shawinigan-2 = 8 turbines / rangee). Une centrale avec moins de
  // turbines garde donc EXACTEMENT la meme grosseur d'icone (pas d'agrandissement).
  // Bornee par la hauteur dispo de la section pour ne jamais deborder verticalement.
  const REF_N = 8;   // turbines par rangee de reference (Shawinigan-2)
  const zoneHcommon = secH - titleH;
  const iconSz = Math.max(24, Math.min(Math.floor((w - pad*2 - (REF_N-1)*gap) / REF_N), zoneHcommon - labelH));
  units.forEach((u, si) => {
    const cfg = turbineConfig(u.spec, u.turb);
    const N = u.spec.nb_groupes;
    const yTop = pad + si * (secH + sectionGap);
    // Titre de section (si sous-groupes).
    if (titleH) {
      cx.font = 'bold 15px "Segoe UI",Arial,sans-serif';
      cx.fillStyle = '#1a1a2e';
      cx.textAlign = 'left'; cx.textBaseline = 'top';
      const kU = cfg ? cfg.charges.filter(v => v > 0).length : 0;
      cx.fillText(u.label + '  (' + kU + '/' + N + ')', pad, yTop);
    }
    // Zone icones : repartie sur la largeur (taille commune iconSz).
    const zoneY = yTop + titleH;
    const zoneH = secH - titleH;
    const rowW = N * iconSz + (N-1) * gap;
    let curX = Math.max(pad, (w - rowW) / 2);
    const iconTop = zoneY + Math.max(0, (zoneH - labelH - iconSz) / 2);
    for (let g = 0; g < N; g++) {
      const charge = cfg ? cfg.charges[g] : 0;
      // Icone dessinee telle quelle (couleurs 3D conservees, pas de teinte). La charge
      // est portee par le % sous l'icone. Une turbine a l'arret est estompee.
      if (turbIm && turbIm.complete && turbIm.naturalWidth > 0) {
        cx.save();
        cx.globalAlpha = (charge > 0) ? 1.0 : 0.28;
        cx.drawImage(turbIm, curX, iconTop, iconSz, iconSz);
        cx.restore();
      }
      // Libelle % sous l'icone (plus gros, en gras). Surcharge (>100 %) en orange.
      cx.font = 'bold 18px "Segoe UI",Arial,sans-serif';
      cx.fillStyle = (charge <= 0) ? '#aaa' : (charge > 1.001 ? '#c25a00' : '#2a6a2a');
      cx.textAlign = 'center'; cx.textBaseline = 'top';
      const pctTxt = charge > 0 ? Math.round(charge*100) + ' %' : 'arrêt';
      cx.fillText(pctTxt, curX + iconSz/2, iconTop + iconSz + 4);
      curX += iconSz + gap;
    }
  });
}

function drawBigChartRes() {
  if (modalResIdx < 0) return;
  const r = D.reservoirs[modalResIdx];
  const w = modalCv.width  = modalCv.clientWidth;
  const h = modalCv.height = modalCv.clientHeight;
  const cx = modalCtx;
  const pad = { l: 60, r: 20, t: 10, b: 36 };
  cx.clearRect(0, 0, w, h);

  // Echelle Y combinee (deversement + apport).
  let yMin = Infinity, yMax = -Infinity;
  for (const v of r.devs)    { if (v === null) continue; if (v < yMin) yMin = v; if (v > yMax) yMax = v; }
  for (const v of r.apports) { if (v === null) continue; if (v < yMin) yMin = v; if (v > yMax) yMax = v; }
  if (!isFinite(yMin) || !isFinite(yMax) || yMax <= yMin) { yMin = 0; yMax = 1; }
  const yTop = yMax + Math.max(10, yMax * 0.05);
  const yBot = Math.min(0, yMin);

  const xPad = 3;
  const xSpan = (N - 1) + xPad;
  const innerW = w - pad.l - pad.r;
  const innerH = h - pad.t - pad.b;
  const xOf = i => pad.l + (i / xSpan) * innerW;
  const yOf = v => pad.t + (1 - (v - yBot) / Math.max(yTop - yBot, 0.0001)) * innerH;

  // Bande "futur".
  const xFut = xOf(frame + 1);
  if (xFut < pad.l + innerW) {
    cx.fillStyle = 'rgba(150,150,160,.18)';
    cx.fillRect(xFut, pad.t, pad.l + innerW - xFut, innerH);
  }

  // Grille horizontale + ticks Y.
  cx.strokeStyle = '#e3e6ef'; cx.lineWidth = 1;
  cx.fillStyle = '#666'; cx.font = '11px "Segoe UI",Arial';
  cx.textAlign = 'right'; cx.textBaseline = 'middle';
  for (let g = 0; g <= 5; g++) {
    const y = pad.t + (g / 5) * innerH;
    cx.beginPath(); cx.moveTo(pad.l, y); cx.lineTo(pad.l + innerW, y); cx.stroke();
    const val = yTop - (g / 5) * (yTop - yBot);
    cx.fillText(Math.round(val) + ' m³/s', pad.l - 6, y);
  }

  // Ticks X : 5 dates reparties.
  cx.fillStyle = '#666';
  cx.textAlign = 'center'; cx.textBaseline = 'top';
  for (let g = 0; g <= 4; g++) {
    const i = Math.round((g / 4) * (N - 1));
    cx.fillText(D.timestamps[i], xOf(i), h - pad.b + 6);
  }

  // Courbe APPORT (vert, stem-plot — chaque mesure = trait vertical de 0 a la
  // valeur, sans interpolation entre les mesures). L'apport est journalier et
  // discret ; un trait continu suggererait une evolution continue trompeuse.
  const greenStroke = '#1a6e2a';
  const apportBaseY = yOf(0);
  cx.strokeStyle = greenStroke; cx.lineWidth = 2.2;
  cx.beginPath();
  for (let i = 0; i < N; i++) {
    const v = r.apports[i];
    if (v == null || v <= 0) continue;
    const xx = xOf(i);
    cx.moveTo(xx, apportBaseY);
    cx.lineTo(xx, yOf(v));
  }
  cx.stroke();

  // Courbe DEVERSEMENT (bleu, par-dessus).
  const blueStroke = '#1a3060';
  cx.beginPath();
  cx.strokeStyle = blueStroke; cx.lineWidth = 2.6;
  let started = false;
  for (let i = 0; i < N; i++) {
    const v = r.devs[i]; if (v === null) { started = false; continue; }
    const xx = xOf(i), yy = yOf(v);
    if (!started) { cx.moveTo(xx, yy); started = true; } else { cx.lineTo(xx, yy); }
  }
  cx.stroke();

  // Curseur vertical + point sur la frame courante (deversement).
  const xCur = xOf(frame);
  cx.strokeStyle = 'rgba(200,40,40,.85)'; cx.lineWidth = 1.5;
  cx.beginPath(); cx.moveTo(xCur, pad.t); cx.lineTo(xCur, pad.t + innerH); cx.stroke();
  const dCur = r.devs[frame];
  if (dCur != null) {
    cx.fillStyle = blueStroke;
    cx.beginPath(); cx.arc(xCur, yOf(dCur), 4, 0, 2 * Math.PI); cx.fill();
    cx.fillStyle = '#222'; cx.font = 'bold 12px "Segoe UI",Arial';
    const txt = Math.round(dCur) + ' m³/s';
    const txtW = cx.measureText(txt).width;
    const fitsRight = (xCur + 6 + txtW) <= (pad.l + innerW - 2);
    cx.textAlign = fitsRight ? 'left' : 'right';
    cx.textBaseline = 'bottom';
    cx.fillText(txt, xCur + (fitsRight ? 6 : -6), yOf(dCur) - 4);
  }

  // Legende couleurs en haut a gauche.
  cx.font = '12px "Segoe UI",Arial';
  cx.textAlign = 'left'; cx.textBaseline = 'top';
  cx.fillStyle = blueStroke;  cx.fillRect(pad.l + 4, pad.t + 5,  22, 7);
  cx.fillStyle = '#333';      cx.fillText('Déversement', pad.l + 32, pad.t + 0);
  cx.fillStyle = greenStroke; cx.fillRect(pad.l + 4, pad.t + 23, 22, 7);
  cx.fillStyle = '#333';      cx.fillText('Précipitation', pad.l + 32, pad.t + 18);
}

function openModalNivRes(k) {
  modalNivResIdx = k;
  modalIdx = -1;
  modalResIdx = -1;
  modalTurbIdx = -1;
  modalNote.innerHTML = '';
  modalTable.innerHTML = '';
  const r = D.reservoirs[k];
  const cur = r.niveauxEff[frame];
  modalTitle.textContent = r.nom + ' — niveau du reservoir';
  const minV = r.minNiv != null ? r.minNiv.toFixed(2) + ' m' : '—';
  const maxV = r.maxNiv != null ? r.maxNiv.toFixed(2) + ' m' : '—';
  const curV = cur != null ? cur.toFixed(2) + ' m' : '—';
  modalStats.textContent =
    'Courant : ' + curV + '  ·  ' +
    'Min : ' + minV + '  ·  ' +
    'Max : ' + maxV;
  // Note : date de debut de l'historique extraite du timestamp du min
  if (r.minNivTs) {
    const d = r.minNivTs.substring(0, 10).replace(/\//g, '-');
    modalNote.innerHTML = 'Donn&eacute;es accumul&eacute;es depuis le ' + d + '. Min et max se mettent &agrave; jour automatiquement.';
  }
  modal.classList.add('open');
  requestAnimationFrame(drawBigChartNivRes);
}

function drawBigChartNivRes() {
  if (modalNivResIdx < 0) return;
  const r = D.reservoirs[modalNivResIdx];
  const w = modalCv.width  = modalCv.clientWidth;
  const h = modalCv.height = modalCv.clientHeight;
  const cx = modalCtx;
  const pad = { l: 68, r: 20, t: 28, b: 36 };
  cx.clearRect(0, 0, w, h);

  const niveaux = r.niveauxEff;
  let yMin = Infinity, yMax = -Infinity;
  for (const v of niveaux) { if (v == null) continue; if (v < yMin) yMin = v; if (v > yMax) yMax = v; }
  if (r.minNiv != null && r.minNiv < yMin) yMin = r.minNiv;
  if (r.maxNiv != null && r.maxNiv > yMax) yMax = r.maxNiv;
  if (!isFinite(yMin) || !isFinite(yMax)) { yMin = 0; yMax = 1; }
  const spread = Math.max(yMax - yMin, 0.5);
  const yBot = yMin - spread * 0.08;
  const yTop = yMax + spread * 0.08;

  const innerW = w - pad.l - pad.r;
  const innerH = h - pad.t - pad.b;
  const xSpan = Math.max(N - 1, 1);
  const xOf = i => pad.l + (i / xSpan) * innerW;
  const yOf = v => pad.t + (1 - (v - yBot) / (yTop - yBot)) * innerH;

  // Bande futur
  const xFut = xOf(frame + 1);
  if (xFut < pad.l + innerW) {
    cx.fillStyle = 'rgba(150,150,160,.18)';
    cx.fillRect(xFut, pad.t, pad.l + innerW - xFut, innerH);
  }

  // Grille horizontale + labels Y
  cx.strokeStyle = '#e3e6ef'; cx.lineWidth = 1;
  cx.fillStyle = '#666'; cx.font = '11px "Segoe UI",Arial';
  cx.textAlign = 'right'; cx.textBaseline = 'middle';
  for (let g = 0; g <= 5; g++) {
    const y = pad.t + (g / 5) * innerH;
    cx.beginPath(); cx.moveTo(pad.l, y); cx.lineTo(pad.l + innerW, y); cx.stroke();
    const val = yTop - (g / 5) * (yTop - yBot);
    cx.fillText(val.toFixed(2) + ' m', pad.l - 6, y);
  }

  // Ticks X
  cx.fillStyle = '#666'; cx.textAlign = 'center'; cx.textBaseline = 'top';
  for (let g = 0; g <= 4; g++) {
    const i = Math.round((g / 4) * (N - 1));
    cx.fillText(D.timestamps[i], xOf(i), h - pad.b + 6);
  }

  // Ligne MIN historique (rouge pointille)
  if (r.minNiv != null) {
    const yM = yOf(r.minNiv);
    cx.save();
    cx.strokeStyle = '#c0392b'; cx.lineWidth = 1.4;
    cx.setLineDash([6, 4]);
    cx.beginPath(); cx.moveTo(pad.l, yM); cx.lineTo(pad.l + innerW, yM); cx.stroke();
    cx.restore();
    cx.fillStyle = '#c0392b'; cx.font = 'bold 10px "Segoe UI",Arial';
    cx.textAlign = 'right'; cx.textBaseline = 'bottom';
    cx.fillText('min ' + r.minNiv.toFixed(2) + ' m', pad.l + innerW - 4, yM - 2);
  }

  // Ligne MAX historique (vert pointille)
  if (r.maxNiv != null) {
    const yM = yOf(r.maxNiv);
    cx.save();
    cx.strokeStyle = '#1a6e2a'; cx.lineWidth = 1.4;
    cx.setLineDash([6, 4]);
    cx.beginPath(); cx.moveTo(pad.l, yM); cx.lineTo(pad.l + innerW, yM); cx.stroke();
    cx.restore();
    cx.fillStyle = '#1a6e2a'; cx.font = 'bold 10px "Segoe UI",Arial';
    cx.textAlign = 'right'; cx.textBaseline = 'top';
    cx.fillText('max ' + r.maxNiv.toFixed(2) + ' m', pad.l + innerW - 4, yM + 2);
  }

  // Courbe niveau (bleu)
  const blueStroke = '#1a3060';
  cx.beginPath(); cx.strokeStyle = blueStroke; cx.lineWidth = 2.4;
  let started = false;
  for (let i = 0; i < N; i++) {
    const v = niveaux[i]; if (v == null) { started = false; continue; }
    const xx = xOf(i), yy = yOf(v);
    if (!started) { cx.moveTo(xx, yy); started = true; } else { cx.lineTo(xx, yy); }
  }
  cx.stroke();

  // Curseur + valeur courante
  const xCur = xOf(frame);
  cx.strokeStyle = 'rgba(200,40,40,.85)'; cx.lineWidth = 1.5;
  cx.beginPath(); cx.moveTo(xCur, pad.t); cx.lineTo(xCur, pad.t + innerH); cx.stroke();
  const nCur = niveaux[frame];
  if (nCur != null) {
    cx.fillStyle = blueStroke;
    cx.beginPath(); cx.arc(xCur, yOf(nCur), 4, 0, 2 * Math.PI); cx.fill();
    cx.fillStyle = '#222'; cx.font = 'bold 12px "Segoe UI",Arial';
    const txt = nCur.toFixed(2) + ' m';
    const txtW = cx.measureText(txt).width;
    const fitsRight = (xCur + 6 + txtW) <= (pad.l + innerW - 2);
    cx.textAlign = fitsRight ? 'left' : 'right';
    cx.textBaseline = 'bottom';
    cx.fillText(txt, xCur + (fitsRight ? 6 : -6), yOf(nCur) - 4);
  }

}
modalClose.addEventListener('click', closeModal);
modalInfoClose.addEventListener('click', closeInfoModal);
modalInfoEl.addEventListener('click', (ev) => { if (ev.target === modalInfoEl) closeInfoModal(); });
modal.addEventListener('click', (ev)=>{ if (ev.target === modal) closeModal(); });
document.addEventListener('keydown', (ev)=>{
  if (ev.key === 'Escape') {
    if (modalInfoCIdx !== -1 || modalInfoRIdx !== -1) { closeInfoModal(); return; }
    if (modalIdx !== -1 || modalResIdx !== -1 || modalTurbIdx !== -1 || modalNivResIdx !== -1) closeModal();
  }
});
modalCv.addEventListener('click', (ev)=>{
  if (modalIdx < 0 && modalResIdx < 0 && modalNivResIdx < 0) return;
  const r = modalCv.getBoundingClientRect();
  const xPix = (ev.clientX - r.left) * (modalCv.width / r.width);
  const pad = { l: 60, r: 20 };
  const innerW = modalCv.width - pad.l - pad.r;
  const t = (xPix - pad.l) / innerW;
  const f = Math.max(0, Math.min(N - 1, Math.round(t * (N - 1))));
  stop(); go(f);
  if (modalIdx >= 0) drawBigChart();
  else if (modalResIdx >= 0) drawBigChartRes();
  else if (modalNivResIdx >= 0) drawBigChartNivRes();
});

window.addEventListener('resize', ()=>{
  if (modalIdx >= 0) drawBigChart();
  else if (modalResIdx >= 0) drawBigChartRes();
  else if (modalNivResIdx >= 0) drawBigChartNivRes();
  else if (modalTurbIdx >= 0) drawTurbineModal();
});

// Enregistrement du service worker (PWA installable). Silencieux si non supporte
// ou en file:// : ne doit jamais bloquer l'affichage.
// EN DEVELOPPEMENT LOCAL (localhost/127.0.0.1) : on n'enregistre PAS le SW et on
// desenregistre tout SW existant + on purge ses caches, pour que chaque regeneration
// soit visible immediatement (pas de version cachee servie par le SW). En production
// (GitHub Pages), comportement PWA normal.
(function () {
  if (!('serviceWorker' in navigator)) return;
  var host = location.hostname;
  var isLocal = (host === 'localhost' || host === '127.0.0.1' || host === '[::1]');
  if (isLocal) {
    navigator.serviceWorker.getRegistrations().then(function (regs) {
      regs.forEach(function (r) { r.unregister(); });
    }).catch(function () {});
    if (window.caches && caches.keys) {
      caches.keys().then(function (keys) {
        keys.forEach(function (k) { caches.delete(k); });
      }).catch(function () {});
    }
    return;
  }
  navigator.serviceWorker.addEventListener('controllerchange', function () {
    window.location.reload();
  });
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js', { scope: './' }).catch(function () { /* ignore */ });
  });
})();
